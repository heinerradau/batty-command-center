*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;transition:background .2s,color .2s}
button{font-family:inherit;color:inherit;cursor:pointer;border:0;background:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.mono{font-family:var(--mono)}
svg{stroke-linecap:round;stroke-linejoin:round}

#app{height:100dvh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:calc(9px + var(--safe-t)) 13px 9px;border-bottom:1px solid var(--line);background:var(--bg);z-index:30}
.ic{width:38px;height:38px;display:grid;place-items:center;border-radius:10px;flex:0 0 auto}
.ic:hover{background:var(--panel)} .ic svg{width:21px;height:21px;stroke:var(--ink);fill:none;stroke-width:1.8}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;min-width:0}
.brand b{font-size:15px;letter-spacing:.2px;white-space:nowrap}

.spacer{flex:1}
.conn{font:600 10px/1 var(--mono);letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;gap:6px;color:var(--muted);border:1px solid var(--line);padding:6px 9px;border-radius:99px}
.conn .d{width:7px;height:7px;border-radius:99px;background:var(--s-waiting)}
.conn[data-live="1"] .d{background:var(--s-progress)} .conn[data-live="1"]{color:var(--ink-dim)}

.body{flex:1;min-height:0;display:flex}
@media(min-width:860px){
  .body{display:grid;grid-template-columns:var(--side) 1fr var(--ovw)}
  body.ovw-hidden .body{grid-template-columns:var(--side) 1fr 0}
  body.ovw-hidden #overview{display:none}
}
.side{width:var(--side);flex:0 0 var(--side);border-right:1px solid var(--line);background:var(--bg-2);display:flex;flex-direction:column;min-height:0}
.center{min-width:0;display:flex;flex-direction:column;min-height:0;flex:1}
#overview{width:var(--ovw);flex:0 0 var(--ovw);border-left:1px solid var(--line);background:var(--bg-2);display:flex;flex-direction:column;min-height:0}
#ovResize{position:fixed;top:0;bottom:0;right:var(--ovw);width:9px;transform:translateX(4px);cursor:col-resize;z-index:40}
#ovResize:hover,#ovResize.drag{background:linear-gradient(90deg,transparent,var(--accent-soft),transparent)}
body.ovw-hidden #ovResize{display:none}
@media(max-width:900px){#ovResize{display:none}}

/* sidebar */
.side-top{padding:11px;display:flex;flex-direction:column;gap:7px;border-bottom:1px solid var(--line)}
.btn-pri{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--accent);color:var(--on-accent);font-weight:700;border-radius:10px;padding:10px;font-size:13.5px}
.btn-pri svg{width:17px;height:17px;stroke:var(--on-accent);fill:none;stroke-width:2.2}
.btn-sec{display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:9px;font-size:13px;color:var(--ink-dim);font-weight:600}
.btn-sec svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.filters{display:flex;flex-direction:column;gap:6px}
.selrow{display:flex;gap:6px}
.sel{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;padding:7px 8px;font:600 11px/1 var(--mono);text-transform:uppercase;letter-spacing:.3px;appearance:none;-webkit-appearance:none}
.sortrow{display:flex;gap:6px}
.sortrow button{flex:1;font:600 10px/1 var(--mono);letter-spacing:.3px;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:7px 4px}
.sortrow button[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--ink);color:var(--ink)}
.side-scroll{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin}
.ws-sec{margin-bottom:4px}
.ws-head{display:flex;align-items:center;gap:8px;padding:9px 9px 6px;font:600 11px/1 var(--mono);letter-spacing:.6px;text-transform:uppercase;color:var(--muted);width:100%;text-align:left}
.ws-head .ic-emoji{font-size:13px}
.ws-head .cnt{margin-left:auto;color:var(--muted-2)}
.ws-head .chev{transition:transform .2s;font-size:9px;color:var(--muted-2)}
.ws-sec.collapsed .chev{transform:rotate(-90deg)} .ws-sec.collapsed .proj-row{display:none}
.proj-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;width:100%;text-align:left;color:var(--ink-dim)}
.proj-row:hover{background:var(--panel)}
.proj-row[aria-current="page"]{background:var(--panel-2);color:var(--ink)}
.proj-row.dragover{outline:2px dashed var(--red);outline-offset:-2px}
.dot{width:9px;height:9px;border-radius:99px;flex:0 0 auto;border:1.5px solid var(--muted-2);background:transparent}
.dot.red{background:var(--p-red);border-color:var(--p-red)} .dot.yellow{background:var(--p-yellow);border-color:var(--p-yellow)}
.dot.green{background:var(--p-green);border-color:var(--p-green)} .dot.idea{border-style:dotted}
.proj-row .nm{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-row.done .nm{text-decoration:line-through;color:var(--muted)}
.proj-row .oc{font:600 10px/1 var(--mono);color:var(--red);background:var(--red-soft);padding:3px 6px;border-radius:99px}
.proj-row .mdots{opacity:0;font-size:16px;color:var(--muted);padding:0 2px;line-height:1}
.proj-row:hover .mdots{opacity:.7}
.side-foot{padding:8px 11px calc(9px + var(--safe-b));border-top:1px solid var(--line);display:flex;gap:10px}
.side-foot button{font:600 11px/1 var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.3px}

.scrim{position:fixed;inset:0;background:#0a0a12aa;z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
@media(max-width:859px){
  .side{position:fixed;inset:0 auto 0 0;z-index:50;transform:translateX(-100%);transition:transform .25s;padding-top:var(--safe-t)}
  body.drawer .side{transform:none} body.drawer .scrim{opacity:1;pointer-events:auto}
  #overview{position:fixed;inset:0 0 0 auto;z-index:50;transform:translateX(100%);transition:transform .25s;width:min(340px,86vw);padding-top:var(--safe-t)}
  body.ovw-open #overview{transform:none} body.ovw-open .scrim{opacity:1;pointer-events:auto}
}
@media(min-width:860px){ .menu-btn,.ovw-mobile{display:none} .scrim{display:none} }

/* center */
.cscroll{flex:1;overflow-y:auto;padding:0 16px 16px}
.cscroll .wrap{max-width:760px;margin:0 auto;padding-top:16px}
.chead{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line)}
.chead .back{display:none} @media(max-width:859px){.chead .back{display:grid}}
.chead .ttl{font-weight:700;font-size:16px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font:600 10px/1 var(--mono);letter-spacing:.3px;text-transform:uppercase;padding:5px 8px;border-radius:99px;border:1px solid var(--line);color:var(--ink-dim);white-space:nowrap}
.badge.ws{background:var(--accent-soft)} .badge.city{border-color:var(--red);color:var(--red)}
.badge.red{border-color:var(--red);color:var(--red)}

.summary{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:14px;box-shadow:var(--shadow)}
.summary .cap{font:600 10px/1 var(--mono);letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;cursor:pointer}
.summary .cap .chev{margin-left:auto;transition:transform .2s}
.summary.collapsed .cap .chev{transform:rotate(-90deg)} .summary.collapsed .md{display:none}
.summary .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.md p{margin:0 0 8px;color:var(--ink-dim);font-size:14px} .md p:last-child{margin:0}
.md ul{margin:0 0 8px;padding-left:18px;color:var(--ink-dim);font-size:14px} .md li{margin:3px 0}
.md strong{color:var(--ink)} .md code{font-family:var(--mono);font-size:.85em;background:var(--panel-2);padding:1px 5px;border-radius:5px}
.md .stitle{font:600 11px/1 var(--mono);letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin:11px 0 7px}
.mtable{width:100%;border-collapse:collapse;font-size:12.5px;margin:4px 0 9px}
.mtable th{text-align:left;font:600 9px/1 var(--mono);letter-spacing:.3px;text-transform:uppercase;color:var(--muted);padding:6px 7px;border-bottom:1px solid var(--line)}
.mtable td{padding:7px;border-bottom:1px solid var(--line);color:var(--ink-dim)} .mtable tr:last-child td{border-bottom:0}

/* greeting / dashboard */
.eyebrow{font:600 11px/1 var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
h1.vt{font-size:23px;letter-spacing:-.3px;margin:2px 0 16px;font-weight:750}
.dash{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.dcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px;box-shadow:var(--shadow)}
.dcard .k{font:600 10px/1 var(--mono);letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.dcard .v{font-size:20px;font-weight:750;margin-top:6px}
.dcard .s{font-size:11px;color:var(--muted);margin-top:3px}
.dash-note{font-size:11px;color:var(--muted-2);margin:-8px 0 18px}

/* chat */
.thread{display:flex;flex-direction:column;gap:11px;padding:6px 0 8px}
.msg{max-width:84%;padding:11px 13px;border-radius:16px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
.msg.me{align-self:flex-end;background:var(--accent);color:var(--on-accent);border-bottom-right-radius:5px}
.msg.batty{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg .mlabel{font:600 9px/1 var(--mono);letter-spacing:1px;text-transform:uppercase;opacity:.6;margin-bottom:5px;display:block}
.msg .atts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.msg .att{display:inline-flex;align-items:center;gap:6px;font:600 11px/1 var(--mono);background:#0000001f;padding:6px 8px;border-radius:8px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg .athumb{width:120px;height:120px;object-fit:cover;border-radius:10px;display:block}
.msg.audio{display:flex;align-items:center;gap:9px}
.msg.audio .micic{flex:0 0 auto;display:inline-flex}
.msg.audio .micic svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.msg.audio .adur{font:600 10px/1 var(--mono);opacity:.6;margin-left:6px}
.msg.audio .trx{font-style:italic;opacity:.7}
.msg.audio.transcribing .micic{animation:micpulse 1s ease-in-out infinite}
@keyframes micpulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes eq{0%,100%{height:6px}50%{height:18px}}
.typing{align-self:flex-start;display:flex;gap:5px;padding:13px 15px;background:var(--panel);border:1px solid var(--line);border-radius:16px}
.typing i{width:7px;height:7px;border-radius:99px;background:var(--muted);animation:blink2 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink2{0%,60%,100%{opacity:.25}30%{opacity:1}}
.securenote{margin:0 0 10px;font:600 11px/1.4 var(--mono);color:var(--s-waiting);border:1px solid var(--s-waiting);border-radius:10px;padding:9px 11px}
.mock-tag{display:inline-block;font:600 9px/1 var(--mono);letter-spacing:.5px;text-transform:uppercase;color:var(--s-waiting);border:1px solid var(--s-waiting);border-radius:99px;padding:3px 6px;margin-left:6px}
.empty{text-align:center;color:var(--muted);padding:40px 18px;font-size:14px}.empty .big{font-size:30px;margin-bottom:10px;opacity:.7}

/* composer */
.composer{border-top:1px solid var(--line);background:var(--bg);padding:9px 13px calc(9px + var(--safe-b))}
.composer .atts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px}.composer .atts:empty{display:none}
.att-chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:5px 8px;font:600 11px/1 var(--mono);max-width:170px}
.att-chip img{width:24px;height:24px;border-radius:5px;object-fit:cover}.att-chip .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.att-chip .x{color:var(--muted);font-size:15px;padding-left:2px}
.composer .row{display:flex;align-items:flex-end;gap:7px}
.composer textarea{flex:1;resize:none;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:18px;padding:10px 14px;font-family:inherit;font-size:14px;max-height:130px;line-height:1.4}
.composer textarea::placeholder{color:var(--muted-2)}
.cbtn{flex:0 0 auto;width:40px;height:40px;border-radius:99px;border:1px solid var(--line);background:var(--panel);display:grid;place-items:center}
.cbtn svg{width:19px;height:19px;stroke:var(--ink);fill:none;stroke-width:1.8}
.cbtn.send{background:var(--accent);border-color:var(--accent)}.cbtn.send svg{stroke:var(--on-accent)}
.cbtn.rec.active{background:var(--red);border-color:var(--red);animation:recpulse 1.1s infinite}.cbtn.rec.active svg{stroke:#fff}.cbtn.off{opacity:.4}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(208,92,84,.45)}50%{box-shadow:0 0 0 8px rgba(208,92,84,0)}}
.rectimer{font:600 12px/1 var(--mono);color:var(--red);align-self:center;min-width:36px;text-align:center}

/* overview panel */
.ov-head{display:flex;align-items:center;gap:8px;padding:12px 13px;border-bottom:1px solid var(--line)}
.ov-head .t{font:600 11px/1 var(--mono);letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);flex:1}
.ov-scroll{flex:1;overflow-y:auto;padding:10px}
.tk{display:flex;align-items:center;gap:10px;padding:10px 9px;border-radius:9px}
.tk:hover{background:var(--panel)}
.tk.dragging{opacity:.5}
.tk .play{width:22px;height:22px;flex:0 0 auto;display:grid;place-items:center;border-radius:99px;position:relative}
.tk .play .dt{width:11px;height:11px;border-radius:99px;border:1.6px solid var(--muted-2);background:transparent}
.tk .play .dt.red{background:var(--p-red);border-color:var(--p-red)}.tk .play .dt.yellow{background:var(--p-yellow);border-color:var(--p-yellow)}
.tk .play .dt.green{background:var(--p-green);border-color:var(--p-green)}.tk .play .dt.idea{border-style:dotted}
.tk .play .sym{position:absolute;inset:0;display:none;place-items:center;font-size:10px;color:var(--ink)}
.tk .play:hover .dt{opacity:0}.tk .play:hover .sym{display:grid}
.tk.run .dt{animation:blinkdot 1s infinite;background:var(--s-progress);border-color:var(--s-progress)}
.tk.queued .dt{animation:blinkdot 1s infinite;background:var(--s-waiting);border-color:var(--s-waiting)}
.tk.blocked .dt{animation:blinkdot 1s infinite;background:var(--s-blocked);border-color:var(--s-blocked)}
.tk.run .play:hover .sym::before{content:"⏹"}.tk.queued .play:hover .sym::before{content:"▶"}
.tk:not(.run):not(.queued):not(.blocked) .play:hover .sym::before{content:"▶"}
@keyframes blinkdot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes queueblink{0%,100%{background:var(--v65-blau);border-color:var(--v65-blau)}50%{background:var(--p-yellow);border-color:var(--p-yellow)}}
.pdot.queued,.trow .pdot.queued,.stask .pdot.queued,.dot.queued,.hdot.queued{animation:queueblink 1.1s infinite}
.tk .body{flex:1;min-width:0}.tk .tt{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk.done .tt{text-decoration:line-through;color:var(--muted)}
.tk .meta{display:flex;gap:8px;align-items:center;margin-top:3px}
.tk .who{font:600 9px/1 var(--mono);color:var(--muted);text-transform:uppercase}
.tk .stt{font:600 9px/1 var(--mono);text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.tk .sub{margin-left:14px}
.tk .mdots{opacity:0;font-size:15px;color:var(--muted);padding:0 4px}.tk:hover .mdots{opacity:.7}
.ov-add{margin:8px;border:1px dashed var(--line);border-radius:9px;padding:9px;color:var(--muted);font:600 12px/1 var(--mono);text-transform:uppercase;letter-spacing:.4px;width:calc(100% - 16px)}

/* calendar */
.cal{padding:14px}
.cal h1{font-size:21px;margin:0 0 14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-day{background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:84px;padding:7px;display:flex;flex-direction:column;gap:4px}
.cal-day.today{border-color:var(--red)}
.cal-day.dragover{outline:2px dashed var(--red);outline-offset:-2px}
.cal-day .dn{font:600 10px/1 var(--mono);color:var(--muted)}
.cal-chip{font:600 10px/1.2 var(--mono);background:var(--accent-soft);border-radius:6px;padding:4px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-foot{margin-top:12px;display:flex;align-items:center;gap:10px;font:600 11px/1 var(--mono);color:var(--muted);text-transform:uppercase}

/* sheets */
.sheet-back{position:fixed;inset:0;z-index:60;background:#0a0a12bb;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-back.open{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;background:var(--bg-2);border:1px solid var(--line);border-radius:20px 20px 0 0;transform:translateY(16px);transition:transform .25s;padding-bottom:calc(12px + var(--safe-b));box-shadow:0 -8px 40px rgba(0,0,0,.28)}
.sheet-back.open .sheet{transform:none}
@media(min-width:860px){.sheet-back{align-items:center}.sheet{border-radius:20px}}
.sheet-head{padding:15px 18px 11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.sheet-head .st{font-weight:700;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sheet-head .x{color:var(--muted);font-size:22px}
.mi{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 18px;font-size:15px;color:var(--ink)}.mi:hover{background:var(--panel)}.mi .ico{width:20px;text-align:center;font-size:16px}.mi.danger{color:var(--red)}
.mlabel{font:600 10px/1 var(--mono);letter-spacing:1.4px;text-transform:uppercase;color:var(--muted-2);padding:13px 18px 5px}
.prio-pick{display:flex;gap:9px;padding:5px 18px 13px}
.prio-pick button{flex:1;height:40px;border-radius:10px;border:1.5px solid var(--line);display:grid;place-items:center;font:600 10px/1 var(--mono);text-transform:uppercase;color:var(--muted)}
.prio-pick button .sw{width:13px;height:13px;border-radius:99px;margin-right:5px;display:inline-block;vertical-align:-2px}
.prio-pick .sw.red{background:var(--p-red)}.prio-pick .sw.yellow{background:var(--p-yellow)}.prio-pick .sw.green{background:var(--p-green)}.prio-pick .sw.none{border:1.5px solid var(--muted-2)}
.field{padding:13px 18px;display:flex;flex-direction:column;gap:7px}.field label{font:600 10px/1 var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.field input,.field textarea,.field select{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:15px;resize:none}
.chips-pick{display:flex;flex-wrap:wrap;gap:7px}
.chips-pick button{border:1.5px solid var(--line);border-radius:99px;padding:7px 11px;font:600 11px/1 var(--mono);color:var(--muted)}
.chips-pick button[aria-pressed="true"]{border-color:var(--ink);color:var(--ink);background:var(--accent-soft)}
.sheet-cta{margin:6px 18px 0;background:var(--accent);color:var(--on-accent);font-weight:700;border-radius:11px;padding:12px;width:calc(100% - 36px);font-size:15px}

.toast{position:fixed;left:50%;bottom:calc(20px + var(--safe-b));transform:translateX(-50%);z-index:80;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 16px;font-size:13px;max-width:90vw;text-align:center;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ---- v5.1: nav, workspace colours, inline tasks, play pill, übersicht ---- */
.side-nav{display:flex;flex-direction:column;gap:2px;padding:6px 6px 2px}
.navitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;width:100%;text-align:left;color:var(--ink-dim);font-weight:600;font-size:13.5px}
.navitem:hover{background:var(--panel)} .navitem[aria-current="page"]{background:var(--panel-2);color:var(--ink)}
.navitem .ig{width:18px;text-align:center}
.side-divider{height:1px;background:var(--line);margin:6px 10px}
.ws-sec{margin-bottom:4px;border-left:3px solid var(--wsc,transparent);border-radius:3px}
.ws-head .ic-emoji{font-size:13px}
.ws-head .swatch{width:9px;height:9px;border-radius:3px;background:var(--wsc,var(--muted-2));flex:0 0 auto}
.ws-head{color:var(--wsc,var(--muted))}
.ws-head .cnt{color:var(--muted-2)}

/* inline task rows (sichtbar in Übersicht + Projekt) */
.tasklist{display:flex;flex-direction:column;gap:2px;margin:2px 0 8px}
.trow{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--panel);box-shadow:var(--shadow)}
.trow+.trow{margin-top:7px}
.trow.sub{margin-left:18px}
.trow .pdot{width:13px;height:13px;border-radius:99px;flex:0 0 auto;border:1.7px solid var(--muted-2);background:transparent;cursor:pointer}
/* V6.3.1: Punktfarben global (auch Sidebar-Tasks .stask .pdot) — vorher nur .trow */
.pdot.red,.trow .pdot.red{background:var(--p-red);border-color:var(--p-red)}
.pdot.yellow,.trow .pdot.yellow{background:var(--p-yellow);border-color:var(--p-yellow)}
.pdot.green,.trow .pdot.green{background:var(--p-green);border-color:var(--p-green)}
.trow .pdot.idea{border-style:dotted}
.trow.blink .pdot{animation:blinkdot 1s infinite}
.trow .tmid{flex:1;min-width:0;cursor:pointer}
.trow .tt{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow.done .tt{text-decoration:line-through;color:var(--muted)}
/* V6.4.1: Fertiges eingegraut — abgedunkelt + reduzierte Deckkraft */
.trow.done{opacity:.5}
.trow.done:hover{opacity:.8}
.stask.done{opacity:.5}
.pcard2.pdone{opacity:.55}.pcard2.pdone:hover{opacity:.85}
.wsproj.pdone{opacity:.6}
.trow .tsub{font:600 10px/1 var(--mono);color:var(--muted);margin-top:4px;display:flex;gap:8px;align-items:center}
.trow .tsub .red{color:var(--red)}
.playpill{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:99px;padding:7px 12px;font:700 11px/1 var(--mono);text-transform:uppercase;letter-spacing:.4px;color:var(--ink)}
.playpill:hover{background:var(--accent-soft)}
.playpill svg{width:13px;height:13px;fill:currentColor;stroke:none}
.trow.run .playpill,.trow.queued .playpill{border-color:var(--s-progress);color:var(--s-progress)}
.trow.blocked .playpill{border-color:var(--red);color:var(--red)}
.trow .tmenu{flex:0 0 auto;color:var(--muted);font-size:17px;padding:0 2px;opacity:.6}

.ovsum{font-size:15px;color:var(--ink-dim);margin:0 0 16px;line-height:1.55}
.ovsum b{color:var(--ink)}
.sec-title{font:600 11px/1 var(--mono);letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);margin:18px 0 9px;display:flex;align-items:center;gap:9px}
.sec-title .n{color:var(--muted-2)}
.pcards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:620px){.pcards{grid-template-columns:1fr}}
.pcard2{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;box-shadow:var(--shadow);cursor:pointer;border-left:3px solid var(--wsc,var(--line))}
.pcard2:hover{border-color:var(--muted-2)}
.pcard2 .ph{display:flex;align-items:center;gap:9px}
.pcard2 .pn{font-weight:700;font-size:14.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard2 .pp{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:99px;padding:5px 9px;font:700 10px/1 var(--mono);text-transform:uppercase;color:var(--ink)}
.pcard2 .pp svg{width:11px;height:11px;fill:currentColor;stroke:none}
.pcard2 .psum{font-size:12.5px;color:var(--muted);margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard2 .pmeta{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.pcard2 .chip2{font:600 9px/1 var(--mono);text-transform:uppercase;letter-spacing:.3px;padding:4px 7px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.pcard2 .chip2.open{color:var(--red);border-color:var(--red)}
.pcard2 .chip2.ws{color:var(--wsc,var(--muted));border-color:var(--wsc,var(--line))}

/* task summary header */
.tsummary .row2{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.prog{height:6px;border-radius:99px;background:var(--panel-2);overflow:hidden;margin:10px 0 4px}
.prog i{display:block;height:100%;background:var(--s-progress)}
.subline{display:flex;align-items:center;gap:8px;padding:8px 2px;font-size:13px;color:var(--ink-dim);border-bottom:1px solid var(--line)}
.subline:last-child{border-bottom:0}
.subline .sd{width:9px;height:9px;border-radius:99px;border:1.5px solid var(--muted-2)}
.subline.done .sd{background:var(--s-done);border-color:var(--s-done)}.subline.done span{text-decoration:line-through;color:var(--muted)}

/* calendar drawer + create */
.calbar{display:flex;align-items:center;gap:10px;margin:0 0 14px}
.calbar button{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font:600 12px/1 var(--mono);color:var(--ink-dim)}
.calbar button[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--ink);color:var(--ink)}
.caldrawer{margin:0 0 18px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:12px;box-shadow:var(--shadow)}
.cal-day .dn{cursor:pointer}
.cal-chip{position:relative;display:flex;align-items:center;gap:4px;max-width:100%}
.cal-chip .cal-chip-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.cal-chip .cx{margin-left:auto;opacity:.5;font-size:11px;cursor:pointer;flex:0 0 auto}
.cal-chip[draggable=true]{cursor:grab}
/* V6.4.9: Kalender sticky oben */
.cal-sticky{position:sticky;top:0;z-index:20;background:var(--bg);padding-top:0;margin:0 -2px 8px}
.cal-sticky.open{box-shadow:0 6px 14px -8px rgba(0,0,0,.25);border-bottom:1px solid var(--line)}
/* aufklappbare Statusboxen */
.dcard.expanded{outline:2px solid var(--accent);background:var(--accent-soft)}
.ovbox-tasks{border:1px solid var(--line);border-radius:12px;margin:2px 0 14px;padding:8px;background:var(--panel)}
.ovbox-hint{font-size:11px;color:var(--muted);padding:4px 8px 8px}
.ovbox-task{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:grab}
.ovbox-task:hover{background:var(--panel-2)}
.ovbox-task .obt-t{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ovbox-task .obt-p{font-size:11px;color:var(--accent);flex:0 0 auto}
.ovbox-task .obt-grip{color:var(--muted);cursor:grab;flex:0 0 auto}
.ovbox-task[draggable=true]:active{opacity:.5}
.proj-row .swdot{width:7px;height:7px;border-radius:2px;flex:0 0 auto;margin-left:2px}

/* ---- v6.2 ---- */
.trow.blink .pdot,.dot.blink,.swatch.blink{animation:blinkdot 1s infinite}
.playpill.describe{border-style:dashed;color:var(--muted)}
.playpill.describe svg{width:13px;height:13px;stroke:currentColor;fill:none}
.ws-head .nmbtn{flex:1;text-align:left;background:none;border:0;color:inherit;font:inherit;cursor:pointer;padding:0}
.ws-head .nmbtn:hover{text-decoration:underline}
/* health */
.healthbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;border:1px solid var(--line);border-left:4px solid var(--hc,var(--s-progress));border-radius:12px;padding:11px 14px;margin:0 0 14px;background:var(--panel);box-shadow:var(--shadow);cursor:pointer;font:600 12px/1 var(--mono)}
.healthbar .hm{display:flex;align-items:center;gap:6px;color:var(--ink-dim)} .healthbar .hm b{color:var(--ink)}
.healthbar .hdot{width:9px;height:9px;border-radius:99px;background:var(--hc,var(--s-progress))}
.healthbar .more{margin-left:auto;color:var(--muted);font-size:11px}
.hc-ok{--hc:var(--s-done)} .hc-warn{--hc:var(--s-waiting)} .hc-crit{--hc:var(--s-blocked)}
.conn .d.lvl-ok{background:var(--p-green)} .conn .d.lvl-warn{background:var(--p-yellow)} .conn .d.lvl-crit{background:var(--p-red)}
.conn[data-live="1"] .d.lvl-ok{background:var(--p-green)}
/* V6.4.1: Token-Mini-Leiste unter dem Live-Indikator */
.tokbar{position:absolute;left:0;right:0;bottom:-5px;height:3px;border-radius:2px;background:var(--line);overflow:hidden}
.tokbar i{display:block;height:100%;background:var(--p-green);transition:width .4s}
.tokbar.warn i{background:var(--p-yellow)} .tokbar.crit i{background:var(--p-red)}
.conn{position:relative}
.health-ov{display:flex;flex-direction:column;gap:0}
.hrow{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line);font-size:14px}
.hrow .hk{color:var(--muted);width:90px;flex:0 0 auto;font:600 11px/1 var(--mono);text-transform:uppercase}
.hrow .hv{flex:1;color:var(--ink)} .hrow .hbar{flex:1;height:7px;border-radius:99px;background:var(--panel-2);overflow:hidden}
.hrow .hbar i{display:block;height:100%;background:var(--s-progress)}
.hrow .hbar i.warn{background:var(--s-waiting)} .hrow .hbar i.crit{background:var(--s-blocked)}
.htop{padding:10px 18px;font:600 11px/1.6 var(--mono);color:var(--muted)}
/* scroll-down lock */
.scrolldown{position:absolute;right:16px;bottom:104px;z-index:8;width:40px;height:40px;border-radius:99px;background:var(--panel-2);border:1px solid var(--line);display:none;place-items:center;box-shadow:0 2px 10px rgba(0,0,0,.18)}
@media(max-width:760px){.scrolldown{bottom:118px}}
.scrolldown.show{display:grid} .scrolldown svg{width:20px;height:20px;stroke:var(--ink);fill:none;stroke-width:2}
.scrolldown.locked{background:var(--accent);border-color:var(--accent)} .scrolldown.locked svg{stroke:var(--on-accent)}
.scrolldown.atbottom{opacity:.45}
.scrolldown .lk{position:absolute;top:-4px;right:-4px;font-size:10px}
.center{position:relative}
/* draft + copy */
.draftind{font:600 10px/1 var(--mono);color:var(--muted);padding:4px 2px 0;height:13px}
.msg{position:relative}
.copybtn{position:absolute;top:4px;right:6px;opacity:0;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:3px 6px;font:600 10px/1 var(--mono);color:var(--muted);transition:opacity .12s}
.msg:hover .copybtn{opacity:.85} .msg.me .copybtn{background:#0000002a;border-color:transparent;color:#fff}
.loadolder{align-self:center;border:1px solid var(--line);border-radius:99px;padding:7px 13px;font:600 11px/1 var(--mono);color:var(--muted);margin-bottom:4px}
/* workspace detail */
.wsproj{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);box-shadow:var(--shadow);padding:13px 15px;margin-bottom:12px;border-left:3px solid var(--wsc,var(--line))}
.wsproj .wh{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.wsproj .wn{font-weight:700;font-size:15px;flex:1;cursor:pointer}
.wsproj .wd{font-size:12.5px;color:var(--muted);margin-bottom:8px}

/* ---- v6.3 ---- */
.brand{display:flex;align-items:center;gap:8px}
.brand #brandBtn{background:none;border:0;color:inherit;cursor:pointer;display:flex;align-items:baseline;gap:7px;font:inherit;padding:0}
.brand #brandBtn b{font-size:15px;letter-spacing:.2px}
.brand .ver{font:600 10px/1 var(--mono);color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:2px 6px}
.brand .globe{cursor:pointer;border:0;background-position:center;background-repeat:no-repeat}
.searchbox{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:7px 10px;background:var(--panel-2)}
.searchbox svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;flex:0 0 auto}
.searchbox input{flex:1;background:none;border:0;outline:none;color:var(--ink);font:inherit;font-size:13px}
.searchbox .sx{background:none;border:0;color:var(--muted);cursor:pointer;font-size:15px}
/* Sidebar: Workspaces OHNE Projektliste */
.ws-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;border-radius:10px;padding:10px 10px;cursor:pointer;color:var(--ink);font:inherit}
.ws-btn:hover{background:var(--panel-2)}
.ws-btn .swatch{width:11px;height:11px;border-radius:3px;flex:0 0 auto;background:var(--wsc,var(--line))}
.ws-btn .wl{flex:1;font-weight:650;font-size:14px}
.ws-btn .cnt{font:600 11px/1 var(--mono);color:var(--muted)}
.side-divider{display:flex;align-items:center;gap:8px;padding:12px 10px 5px;color:var(--muted);font:600 10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase}
.side-divider::after{content:"";flex:1;height:1px;background:var(--line)}
.side-tasks{display:flex;flex-direction:column;gap:1px}
.stask{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:0;border-radius:8px;padding:8px 10px;cursor:pointer;color:var(--ink);font:inherit}
.stask:hover{background:var(--panel-2)}
.stask .pdot{width:8px;height:8px;border-radius:99px;flex:0 0 auto}
.stask .sl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
.stask .sp{font:600 10px/1 var(--mono);color:var(--muted);flex:0 0 auto}
.stask.blink .pdot{animation:blinkdot 1s infinite}
/* Breadcrumb über dem Titel */
.crumb{display:flex;align-items:center;gap:5px;padding:7px 14px 0;font-size:12px;color:var(--muted)}
.crumb button{background:none;border:0;color:var(--accent);cursor:pointer;font:inherit;padding:0;display:inline-flex;align-items:center;gap:4px}
.crumb button:hover{text-decoration:underline}
.crumb .sep{opacity:.5}
/* + New Task im Panel */
.ovaddtask{display:flex;align-items:center;justify-content:center;gap:7px;margin:10px;padding:10px;border:1px dashed var(--line);border-radius:10px;background:none;color:var(--accent);cursor:pointer;font:inherit;font-weight:600}
.ovaddtask:hover{background:var(--panel-2)}
.taskctx{font:600 10px/1.3 var(--mono);color:var(--muted);padding:6px 10px;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;margin:0 0 8px;background:var(--panel-2)}
/* V6.3.5 move picker */
.mv-list{max-height:54vh;overflow:auto;padding:0 8px 6px}
.mv-ws{display:flex;align-items:center;gap:8px;padding:10px 10px 5px;font:700 11px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.mv-ws .swatch{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.mv-ws .cnt{margin-left:auto;opacity:.7}
.mv-proj{display:flex;align-items:center;gap:10px;width:100%}
.mv-proj .pdot{width:9px;height:9px;border-radius:99px;flex:0 0 auto;border:1.5px solid var(--muted-2)}
.mv-proj .mvn{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-proj .mvo{font:600 10px/1 var(--mono);color:var(--muted);flex:0 0 auto}
.wsproj .wh .pmenu2{margin-left:6px;background:none;border:0;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0 4px;flex:0 0 auto}
.wsproj .wh .pmenu2:hover{color:var(--ink)}
/* V6.4 changelog */
.vlog{padding:8px 18px;border-bottom:1px solid var(--line)}
.vlog .vh{font-size:13px;margin-bottom:3px}
.vlog .vnow{font:600 9px/1 var(--mono);background:var(--accent);color:var(--on-accent);padding:2px 6px;border-radius:99px;letter-spacing:.06em}
.vlog ul{margin:0;padding-left:18px}
.vlog li{font-size:12.5px;color:var(--ink-dim);margin:2px 0}
/* V6.4 cron */
.cronlist{display:flex;flex-direction:column;gap:6px}
.cronrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel)}
.cron-sched{flex:0 0 auto;font-size:11px;color:var(--accent);background:var(--panel-2);padding:3px 7px;border-radius:6px}
.cron-cmd{flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-dim)}
.cronrow .cronedit{flex:0 0 auto}
/* V6.4.1 Daten-Vorschau */
.pfiles{margin:4px 0 14px}
.pfiles .cap{font:700 11px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.pfstrip{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.pfile{flex:0 0 auto;width:96px;background:none;border:0;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:0}
.pfthumb{width:96px;height:72px;border-radius:9px;border:1px solid var(--line);background-size:cover;background-position:center;background-color:var(--panel-2);display:grid;place-items:center;font-size:28px}
.pfile:hover .pfthumb{border-color:var(--accent)}
.pfname{font-size:11px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.fp-body{padding:0 18px 12px;max-height:64vh;overflow:auto}
/* V6.4.1 Marketing Dashboard */
.dashwrap{width:100%;height:62vh;border-bottom:1px solid var(--line);background:var(--paper,#f7f4ee)}
.dashwrap iframe{width:100%;height:100%;border:0;display:block}
/* V6.4.4 Übersicht: Workspace>Projekt>Task */
.whobar{display:flex;align-items:center;gap:6px;margin:6px 0 14px;flex-wrap:wrap}
.whobar .whlbl{font-size:12px;color:var(--muted);margin-right:2px}
.whobar button{font-size:12px;padding:5px 11px;border:1px solid var(--line);border-radius:99px;background:var(--panel);cursor:pointer}
.whobar button[aria-pressed="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.ov-ws{display:flex;align-items:center;gap:9px;margin:18px 0 8px;cursor:pointer;font:700 12px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase}
.ov-ws-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
/* V6.4.8: Basis-Punkt + Übersichts-Punkte hatten keine Größe → Farben unsichtbar. Fix: */
.pdot{width:11px;height:11px;border-radius:99px;flex:0 0 auto;background:transparent;border:1.7px solid var(--muted-2);box-sizing:border-box}
.ov-proj-head .pdot{width:12px;height:12px}
.ov-task .pdot{width:9px;height:9px}
.pdot.blink{animation:blinkdot 1s infinite}
.ov-ws-name{color:var(--ink)}
.ov-ws .n{background:var(--panel-2);color:var(--muted);border-radius:99px;padding:1px 8px;font-size:11px}
.ov-proj{border:1px solid var(--line);border-radius:12px;margin:0 0 8px;overflow:hidden;background:var(--panel)}
.ov-proj-head{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer}
.ov-proj-head:hover{background:var(--panel-2)}
.ov-proj-name{flex:1;font-weight:650;font-size:14px}
.ov-proj-meta{font-size:11px;color:var(--muted)}
.ov-tasks{border-top:1px solid var(--line);padding:4px 0}
.ov-task{display:flex;align-items:center;gap:9px;width:100%;background:none;border:0;text-align:left;padding:7px 13px 7px 22px;cursor:pointer;font-size:13px;color:var(--ink-dim)}
.ov-task:hover{background:var(--panel-2)}
.ov-task-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-task-who{font-size:12px;opacity:.7}
.ov-task.more{color:var(--muted);font-size:12px;padding-left:22px;justify-content:flex-start}
.ov-head .ov-layer{display:block;font:700 9px/1.4 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.trow-proj{color:var(--accent)!important;font-weight:600}
.ws-btn .ws-eye{margin-left:6px;opacity:.45;font-size:12px;transition:opacity .15s}
.ws-btn:hover .ws-eye{opacity:.9}
.ws-btn.ws-hidden{opacity:.5}
.ws-add{opacity:.6}.ws-add:hover{opacity:1}
.msgts{display:block;font-size:10px;color:var(--muted);margin-top:4px;opacity:.7}
.msg.me .msgts{text-align:right}
.msg.audio .msgts{margin-left:auto}
/* V6.4.4 spend&leads chart */
.slchart{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:6px 0 4px;background:var(--panel)}
.slsvg{width:100%;height:90px;overflow:visible}
.slsvg path{fill:none;stroke-width:2}
.sl-spend{stroke:#c0567e}.sl-leads{stroke:#4a9e7f}
.sl-legend{display:flex;gap:12px;align-items:center;margin-top:6px;font-size:11px}
.sl-spend-k{color:#c0567e}.sl-leads-k{color:#4a9e7f}
.sl-last{margin-left:auto;color:var(--muted)}
.cal-hint{font-size:11px;color:var(--muted);margin-top:8px;text-align:center}
/* V6.4.5 Mini-Kalender im Menü */
.minical{background:var(--panel-2);border-radius:12px;padding:10px 12px;margin:2px 18px 6px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mc-title{font-weight:650;font-size:13px;text-transform:capitalize}
.mc-nav{width:30px;height:30px;border:0;background:var(--panel);border-radius:8px;font-size:16px;cursor:pointer;color:var(--ink)}
.mc-nav:hover{background:var(--accent);color:var(--on-accent,#fff)}
.mc-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.mc-dows span{text-align:center;font-size:10px;color:var(--muted);font-weight:600}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mc-empty{aspect-ratio:1}
.mc-day{aspect-ratio:1;border:0;background:var(--panel);border-radius:7px;font-size:12px;cursor:pointer;color:var(--ink);display:grid;place-items:center;transition:transform .08s}
.mc-day:hover{background:var(--accent);color:var(--on-accent,#fff);transform:scale(1.08)}
.mc-day.today{outline:2px solid var(--accent);font-weight:700}
.mc-day.sel{background:var(--accent);color:var(--on-accent,#fff);font-weight:700}
.mc-day.past{opacity:.4}
/* V6.4.6 Übersicht-Aktionen + Archiv */
.ov-actions{display:flex;gap:8px;margin:4px 0 14px}
.ov-act{flex:1;padding:10px;border:1px dashed var(--line);border-radius:10px;background:var(--panel);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
.ov-act:hover{border-color:var(--accent);border-style:solid;color:var(--accent)}
.arch-head{margin-top:22px;display:flex;align-items:center;gap:8px}
.arch-head .arch-toggle{margin-left:auto;font-size:11px;color:var(--muted)}
.arch-restore{margin-left:auto;font-size:11px;color:var(--accent);background:none;border:0;cursor:pointer;font-weight:600}
/* V6.3.2: großer Status-Punkt vor Überschrift im Chat-Header */
.chead .hdot{width:14px;height:14px;border-radius:99px;flex:0 0 auto;background:var(--muted-2);border:1.7px solid var(--muted-2)}
.chead .hdot.red{background:var(--p-red);border-color:var(--p-red);box-shadow:0 0 0 0 var(--p-red)}
.chead .hdot.yellow{background:var(--p-yellow);border-color:var(--p-yellow)}
.chead .hdot.green{background:var(--p-green);border-color:var(--p-green)}
.chead .hdot.blink{animation:blinkdot 1s infinite}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <button class="ic menu-btn" id="menuBtn" aria-label="Menü"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="brand"><button class="globe" id="globeHome" aria-label="Start"></button><button id="brandBtn"><b>Batty Command</b><span class="ver" id="brandVer"></span></button></div>
    <div class="spacer"></div>

async function migrateLegacyWorkspaces(){
  const valid=new Set(WS_DEF.map(w=>w[0]));
  let migrated=0;
  for(const p of (BCC.state.projects||[]).slice()){
    const cur=p.workspaces||[];
    if(!cur.length)continue;
    // schon alles gültig? nichts tun.
    if(cur.every(w=>valid.has(w)))continue;
    const mapped=[...new Set(cur.map(w=>valid.has(w)?w:(WS_MIGRATE[w]||null)).filter(Boolean).filter(w=>valid.has(w)))];
    // wenn nach Mapping leer (z.B. nur nyc und vertrieb existiert nicht): nimm dev als Fallback NICHT —
    // lieber leer lassen, dann landet es bei „Ohne Workspace" und kann manuell zugeordnet werden.
    if(JSON.stringify(mapped)!==JSON.stringify(cur)){
      p.workspaces=mapped;
      try{await patchProject(p.slug,{workspaces:mapped});migrated++}catch(_){}
    }
  }

}

}

  await saveWorkspaceDefs();return true;
}

}

function _chatLocalKey(sessionId){return "bcc:chat:"+sessionId}

function _msgKey(m){return (m.ts||"")+"|"+(m.role||"")+"|"+(m.text||"").slice(0,40)+"|"+(m.audio?"a":"")}
function mergeChats(a,b){const seen=new Map();[...(a||[]),...(b||[])].forEach(m=>{const k=_msgKey(m);if(!seen.has(k))seen.set(k,m)});return [...seen.values()].sort((x,y)=>(x.ts||0)-(y.ts||0))}
async function getChat(sessionId){
  const local=loadChatLocal(sessionId);
  let remote=[];try{remote=await BCC.kv.get("chat:"+sessionId)||[]}catch(_){}
  const merged=remote.length?mergeChats(local,remote):local;   // Remote leer? lokal gewinnt → bleibt sichtbar
  if(merged.length)saveChatLocal(sessionId,merged);
  return merged;
}
async function appendChat(sessionId,msg){
  if(!msg.ts)msg.ts=Date.now();
  const local=loadChatLocal(sessionId);local.push(msg);saveChatLocal(sessionId,local);
  try{const r=await BCC.kv.get("chat:"+sessionId)||[];r.push(msg);await BCC.kv.set("chat:"+sessionId,r)}catch(_){}
  return local;
}

BCC._poll=async(msgId)=>{const url=BCC.config.chatResultEndpoint,sep=url.includes("?")?"&":"?",dl=Date.now()+(BCC.config.chatTimeoutMs||180000);
  let consecutiveNetErrs=0;
  while(Date.now()<dl){
    await new Promise(r=>setTimeout(r,1600));
    try{
      const r=await fetch(url+sep+"msgId="+encodeURIComponent(msgId));
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      consecutiveNetErrs=0;
      if(j.status==="done")return{reply:j.reply,tasksUpdated:!!j.tasksUpdated,mock:false};
      if(j.status==="error")return{reply:"⚠️ Fehler bei der Verarbeitung: "+(j.error||"unbekannt"),mock:false};
    }catch(e){
      // V6.4.3: Netzwerkfehler ≠ "Turn läuft noch". Nach 5 aufeinanderfolgenden
      // Fehlschlägen (~8s) ist der Proxy höchstwahrscheinlich tot — das sagen wir auch so.
      consecutiveNetErrs++;
      BCC.logNet&&BCC.logNet("/chat-result",e);
      if(consecutiveNetErrs>=5)return{reply:"⚠️ Verbindung zum Proxy verloren. Prüfe, ob bcc-proxy läuft (systemctl --user status bcc-proxy), und schick die Nachricht dann erneut.",mock:false,connLost:true};
    }
  }
  return{reply:"AlphaBatty braucht länger — Turn läuft noch.",mock:false}};
BCC._mockReply=(m,slug)=>{const t=(m||"").toLowerCase();
  if(slug==="presse-outreach-nyc"||t.includes("presse"))return"Presse-Outreach NYC: 14 Pitches raus, 1 echte Antwort. Dringend: FAZ-Adresse bounct. Soll ich heute nachfassen?";
  if(t.includes("heute")||t.includes("an"))return"Heute rot: FAZ-Adresse, HTTPS via tailscale. Geblockt: Agentenname fehlt noch.";
  return"Das ist der Mock. Live (BCC.goLive) lese ich deine echten Projektdaten."};

/* ---------------- MARKDOWN ---------------- */
BCC.md=(src="")=>{const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>");
  const L=src.split("\n");let h="",i=0;
  while(i<L.length){const ln=L[i];
    if(/^\s*\|.*\|/.test(ln)&&/^\s*\|[-:\s|]+\|\s*$/.test(L[i+1]||"")){const cells=r=>r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
      const head=cells(ln);i+=2;const body=[];while(i<L.length&&/^\s*\|.*\|/.test(L[i])){body.push(cells(L[i]));i++}
      h+='<table class="mtable"><thead><tr>'+head.map(x=>`<th>${inl(x)}</th>`).join("")+'</tr></thead><tbody>'+body.map(r=>"<tr>"+r.map(c=>`<td>${inl(c)}</td>`).join("")+"</tr>").join("")+'</tbody></table>';continue}
    if(/^#{1,4}\s/.test(ln)){h+=`<div class="stitle">${inl(ln.replace(/^#{1,4}\s/,""))}</div>`;i++;continue}
    if(/^\s*[-*]\s/.test(ln)){const it=[];while(i<L.length&&/^\s*[-*]\s/.test(L[i])){it.push(L[i].replace(/^\s*[-*]\s/,""));i++}h+="<ul>"+it.map(x=>`<li>${inl(x)}</li>`).join("")+"</ul>";continue}
    if(ln.trim()===""){i++;continue}h+=`<p>${inl(ln)}</p>`;i++}
  return h};

function matchProject(message){const kw=(message||"").toLowerCase().split(/[^a-zäöüß0-9]+/).filter(w=>w.length>2);
  let best={slug:null,score:0};
  for(const p of BCC.state.projects){if(p.slug===LOST)continue;let s=0;const nm=(p.name||"").toLowerCase();
    if(message.toLowerCase().includes(nm))s+=0.4;else if(nm.split(/[\s-]+/).some(w=>kw.includes(w)))s+=0.2;
    for(const tag of(p.tags||[]))if(kw.includes(tag))s+=0.15;
    if(p.city&&kw.includes(p.city))s+=0.1;for(const w of(p.workspaces||[]))if(kw.includes(WS_LABEL[w]?.toLowerCase()))s+=0.1;
    if(s>best.score)best={slug:p.slug,score:s}}
  return best.score>=0.3?best.slug:LOST}

function searchChats(q){
  q=(q||"").toLowerCase();if(!q)return[];
  const hits=[];
  let keys=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("bcc:chat:"))keys.push(k)}}catch(_){}
  keys.forEach(k=>{
    const session=k.replace("bcc:chat:","");
    let hist=[];try{hist=JSON.parse(localStorage.getItem(k)||"[]")}catch(_){}
    const m=hist.find(x=>(x.text||"").toLowerCase().includes(q));
    if(!m)return;
    let label=session,goFn=()=>go("overview");
    if(session.startsWith("task-")){const ft=findTask(session.slice(5));if(ft&&ft.t){label=ft.t.title;goFn=()=>go("task",ft.t.id)}}
    else if(session.startsWith("proj-")){const p=projectBySlug(session.slice(5));if(p){label=p.name;goFn=()=>go("project",p.slug)}}
    else if(session==="main"){label="Haupt-Chat";goFn=()=>go("overview")}
    else if(session==="dashboard"){label="Marketing Dashboard";goFn=()=>go("dashboard")}
    hits.push({label,snippet:(m.text||"").slice(0,24),go:goFn});
  });
  return hits;
}

function collectChats(hiddenWs){
  hiddenWs=hiddenWs||{};
  const out=[];const seen=new Set();
  const add=(o)=>{if(seen.has(o.session))return;seen.add(o.session);out.push(o)};
  // alle Sessions, die je berührt wurden (aus _touch) ODER gerade busy sind
  const sessions=new Set([...Object.keys(BCC._touch||{}),...Object.keys(BCC._chatBusy||{})]);
  sessions.forEach(s=>{
    const touch=sessionTouch(s);const busy=_busyAlive(s);
    if(!touch&&!busy)return;
    // proj-* (Projekt-Chat)
    if(s.startsWith("proj-")){const p=projectBySlug(s.slice(5));if(!p)return;
      const wss=inferWorkspaces(p);if(wss.length&&wss.every(w=>hiddenWs[w]))return;
      const pd=projectDot(p);
      add({session:s,label:p.name,icon:"💬",tag:WS_LABEL[wss[0]]?.slice(0,3)||"",
        dotCls:busy?"yellow":pd.cls,blink:busy||pd.blink,active:BCC.state.route==="project"&&BCC.state.slug===p.slug,
        touch:Math.max(touch,busy?Date.now():0),go:()=>go("project",p.slug)});}
    // ws-* (Workspace-Chat)
    else if(s.startsWith("ws-")){const key=s.slice(3);const meta=WS_DEF.find(x=>x[0]===key);if(!meta||hiddenWs[key])return;
      add({session:s,label:meta[2],icon:meta[1],tag:"WS",dotCls:busy?"yellow":"",blink:busy,
        active:BCC.state.route==="workspace"&&BCC.state.wsKey===key,touch:Math.max(touch,busy?Date.now():0),go:()=>go("workspace",key)});}
    // task-* (Task-Chat) — nur wenn sichtbar
    else if(s.startsWith("task-")){const ft=findTask(s.slice(5));if(!ft||!ft.t)return;
      const wss=inferWorkspaces(ft.p);if(wss.length&&wss.every(w=>hiddenWs[w]))return;
      const ws=workStatus(ft.t);
      add({session:s,label:ft.t.title,icon:"☑",tag:ft.p?ft.p.name.slice(0,10):"",
        dotCls:ws.cls,blink:ws.blink,active:BCC.state.route==="task"&&BCC.state.taskId===ft.t.id,
        touch:Math.max(touch,busy?Date.now():0),go:()=>go("task",ft.t.id)});}
    // dashboard — läuft als Marketing-Ebene
    else if(s==="dashboard"){if(hiddenWs["marketing"])return;
      add({session:s,label:"Marketing Dashboard",icon:"📊",tag:"Mar",dotCls:busy?"yellow":"",blink:busy,
        active:BCC.state.route==="dashboard",touch:Math.max(touch,busy?Date.now():0),go:()=>go("dashboard")});}
    // main (Haupt-Chat)
    else if(s==="main"){add({session:s,label:"Haupt-Chat",icon:"🦇",tag:"",dotCls:busy?"yellow":"",blink:busy,
        active:BCC.state.route==="overview",touch:Math.max(touch,busy?Date.now():0),go:()=>go("overview")});}
  });
  out.sort((a,b)=>(b.blink?1:0)-(a.blink?1:0)||b.touch-a.touch);
  return out;
}

      const cl=el("div","side-tasks");
      chats.slice(0,30).forEach(ch=>{
        const b=el("button","stask"+(ch.blink?" blink":""));
        if(ch.active)b.setAttribute("aria-current","page");
        b.innerHTML=`<span class="pdot ${ch.dotCls}"></span><span class="sl">${ch.icon||""} ${ch.label}</span><span class="sp">${ch.tag||""}</span>`;
        b.onclick=ch.go;cl.append(b)});
      wrap.append(cl);
    }
  }
  wrap.append(el("div","side-divider","Tasks · zuletzt"));
  let tasks=BCC.state.projects.flatMap(p=>(p.tasks||[]).map(t=>({t,p})))
    .filter(({t})=>t.status!=="idea")
    .filter(({p})=>{const wss=inferWorkspaces(p);return wss.length===0||!wss.every(w=>hiddenWs[w])});
  if(q)tasks=tasks.filter(({t,p})=>(t.title||"").toLowerCase().includes(q)||(p.name||"").toLowerCase().includes(q));
  // V6.4.1: Reihenfolge — was ICH gerade berührt habe IMMER ganz oben (überlebt Reload via _touch),
  // dann laufende/wartende, dann nach Projekt-Aktualität.
  const tact=({t,p})=>{
    const mine=Math.max(sessionTouch("task-"+t.id), projBusy(p.slug)?sessionTouch("proj-"+p.slug):0);
    const busy=taskBusy(t)?1:0;
    return busy*1e13 + (mine?1e12+mine/1e3:0) + (t.running||t.status==="in_progress"?1e10:0) + (t.status==="blocked"?5e9:0) + (p.updatedAt||0);
  };
  tasks.sort((a,b)=>tact(b)-tact(a));
  const tl=el("div","side-tasks");
  tasks.slice(0,40).forEach(({t,p})=>{const ws=workStatus(t);
    const b=el("button","stask"+(ws.blink?" blink":"")+(t.status==="done"?" done":""));
    if(BCC.state.route==="task"&&BCC.state.taskId===t.id)b.setAttribute("aria-current","page");
    b.innerHTML=`<span class="pdot ${ws.cls}"></span><span class="sl">${t.title}</span><span class="sp">${WS_LABEL[inferWorkspaces(p)[0]]?.slice(0,3)||""}</span>`;
    b.title=p.name;b.onclick=()=>go("task",t.id);tl.append(b)});
  if(!tasks.length)tl.append(el("div","empty",q?"Nichts gefunden.":"Keine offenen Tasks."));
  wrap.append(tl);
}

function rerender(){
  // V6.4.0: Scroll-Position erhalten; #center hat genau einen Scroll-Container.
  const sc=document.querySelector("#center .cscroll");
  const savedTop=sc?sc.scrollTop:null;
  renderSidebar();renderCenter();renderOverviewPanel();
  if(savedTop!=null){const nsc=document.querySelector("#center .cscroll");if(nsc)nsc.scrollTop=savedTop}
}
// V6.4.0: „weicher" Re-Render für Polls — wenn der Nutzer gerade in der Übersicht
// scrollt, NICHT komplett neu bauen (sonst springt es nach oben).
function rerenderSoft(){
  // V6.4.9: Der Poll darf NICHTS anfassen, was gerade gescrollt wird. Wir sichern die
  // Scroll-Positionen, bauen nur Sidebar + (falls nicht gerade gescrollt) das rechte Panel,
  // und stellen die Positionen wieder her. #center wird NIE angefasst.
  const scrollers=[...document.querySelectorAll("#center .cscroll, #overview .ov-scroll")];
  const saved=scrollers.map(s=>[s,s.scrollTop]);
  try{renderSidebar()}catch(_){}
  // Rechtes Panel nur neu bauen, wenn der Nutzer dort nicht gerade scrollt
  const recentlyScrolled=Date.now()-(BCC._lastScrollTs||0)<3000;
  if(!recentlyScrolled){try{renderOverviewPanel()}catch(_){}}
  // Positionen wiederherstellen (Center existiert weiter, Panel ggf. neu)
  saved.forEach(([s,top])=>{if(s&&s.isConnected)s.scrollTop=top});
}

const IC_PLAY='<svg viewBox="0 0 24 24"><path d="M7 5l12 7-12 7z"/></svg>';
const IC_STOP='<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
const IC_PEN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L18 10l-4-4L4 16z"/><path d="M13 7l4 4"/></svg>';
function taskRunState(t){return BCC.run[t.id]==="queued"?"queued":((t.running||BCC.run[t.id]==="running")?"run":(t.status==="blocked"?"blocked":(t.status==="in_progress"?"marker":null)))}
function subInfo(p,t){const subs=(p.tasks||[]).filter(x=>x.parentTaskId===t.id);const done=subs.filter(s=>s.status==="done").length;return{subs,done,total:subs.length}}
/* A1/A2/A3: Farbe = Arbeitsstatus (nicht Dringlichkeit), Blink = aktiv, Grund mitgeführt */
function workStatus(t){
  const rs=taskRunState(t);
  const reallyRunning=(rs==="run")||t.running||BCC.run[t.id]==="running"||taskBusy(t);
  // V6.5.4: Timeout → ROT BLINKEND (nicht still grau werden)
  if(timedOut("task-"+t.id)&&t.status!=="done"&&t.status!=="blocked")
    return{cls:"red",label:"⚠️ hängt — keine Antwort (Timeout)",blink:true};
  // V6.4.1: SOFORT gelb, sobald ich geschrieben habe (Antwort steht aus)
  if(taskBusy(t))return{cls:"yellow",label:"du hast geschrieben …",blink:true};
  if(t.status==="done"){
    const fresh=t.doneAt&&(Date.now()/1000-t.doneAt<300); // 5 Min „frisch fertig" blinkt
    return{cls:"green",label:"Fertig",blink:!!fresh};
  }
  // V6.4.2: „arbeitet …" (gelb BLINKEND) NUR bei echtem laufendem Prozess.
  if(reallyRunning)return{cls:"yellow",label:"arbeitet …",blink:true};
  if(rs==="queued")return{cls:"queued",label:"in der Queue …",blink:false};
  // in_progress-MARKER ([~] in TASKS.md) OHNE laufenden Prozess = „angefangen", GELB STATISCH (kein Blinken,
  // damit man nicht denkt, da läuft gerade was). Das war der Bug: Tasks hingen ewig auf „arbeitet".
  if(t.status==="in_progress")return{cls:"yellow",label:"angefangen",blink:false};
  if(t.status==="blocked")return{cls:"red",label:blockReason(t)||"braucht dich",blink:true};
  if(t.status==="waiting")return{cls:"yellow",label:blockReason(t)||"wartet",blink:false};
  return{cls:"",label:STATUS_LABEL[t.status]||t.status,blink:false};
}
function blockReason(t){return t.reason||t.statusReason||t.blockReason||null}
function projectActive(p){return(p.tasks||[]).some(t=>t.running||BCC.run[t.id]==="running"||BCC.run[t.id]==="queued")||projBusy(p.slug)||(p.tasks||[]).some(t=>taskBusy(t))}
function playable(t){return!!(t.vision&&t.vision.trim().length>3)}

/* Eine sichtbare Task-Zeile — Farbe=Status, Blink=aktiv. V6.3.4: ganze Zeile klickbar,
   Rechtsklick/Long-Press öffnet Task, kein „Beschreiben"-Button mehr (Titel zählt). */
function taskRow(t,p,opts={}){
  const ws=workStatus(t);
  const row=el("div","trow"+(t.status==="done"?" done":"")+(t.parentTaskId?" sub":"")+(ws.blink?" blink":""));
  row.draggable=true;
  row.addEventListener("dragstart",()=>{BCC._dragTask=t.id;row.classList.add("dragging")});
  row.addEventListener("dragend",()=>{row.classList.remove("dragging");setTimeout(()=>BCC._dragTask=null,50)});
  const dot=el("span","pdot "+ws.cls);
  const mid=el("div","tmid");
  const si=subInfo(p,t);
  const projTag=opts.showProject&&p?`<span>·</span><span class="trow-proj">${p.name}</span>`:"";
  mid.innerHTML=`<div class="tt">${t.title}</div><div class="tsub"><span class="${ws.cls==="red"?"red":""}">${ws.label}</span><span>·</span><span>${t.who==="heiner"?"Heiner":"Batty"}</span>${projTag}${si.total?`<span>·</span><span>${si.done}/${si.total} Sub</span>`:""}</div>`;
  // V6.3.4: KLICK auf die ganze Zeile öffnet den Task (mobil-sicher). Rechtsklick ebenso.
  const open=e=>{if(e&&e.target&&e.target.closest&&e.target.closest("button"))return;go("task",t.id)};
  row.onclick=open;
  row.oncontextmenu=e=>{e.preventDefault();go("task",t.id)};
  row.append(dot,mid);
  const rs=taskRunState(t);
  // V6.5.2: Vorschlag (Idee/unklar) → nur ▶ annehmen / ✕ ablehnen. Sonst normale Play-Logik.
  if(V65.isSuggestion&&V65.isSuggestion(t)){
    const acc=el("button","sugbtn play");acc.innerHTML=IC_PLAY;acc.title="Annehmen — wird ein Task mit Prio-Farbe";acc.onclick=e=>{e.stopPropagation();V65.accept(t)};
    const rej=el("button","sugbtn x");rej.textContent="✕";rej.title="Ablehnen — verwerfen";rej.onclick=e=>{e.stopPropagation();V65.reject(t)};
    row.append(acc,rej);
  }
  else if(rs==="run"){const a=el("button","playpill");a.innerHTML=IC_STOP+"Stop";a.onclick=e=>{e.stopPropagation();togglePlay(t)};row.append(a)}
  else if(playable(t)&&t.status!=="done"){const a=el("button","playpill");a.title="▶️ "+t.vision;a.innerHTML=IC_PLAY+(rs==="queued"?"queued":t.status==="blocked"?"erneut":"Play");a.onclick=e=>{e.stopPropagation();confirmPlay(t)};row.append(a)}
  else if(!opts.compact&&t.status!=="done"){const a=el("button","playpill");a.innerHTML=IC_PLAY+"Play";a.title="Auto-Play — Ziel wird aus dem Titel abgeleitet";a.onclick=e=>{e.stopPropagation();V65.play(t)};row.append(a)}
  const menu=el("button","tmenu","⋯");menu.onclick=e=>{e.stopPropagation();openTaskMenu(t.id)};
  row.append(menu);return row;
}

function chead(title,opts={}){
  const wrap=el("div","cheadwrap");
  if(opts.crumb&&opts.crumb.length){const cr=el("div","crumb");
    opts.crumb.forEach((c,i)=>{if(i)cr.append(el("span","sep","›"));const b=el("button",null,`<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;vertical-align:-2px"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg> ${c.label}`);b.onclick=c.go;cr.append(b)});
    wrap.append(cr)}
  const h=el("div","chead");

BCC.logError=async(message,stack,where)=>{
  const e={message:String(message).slice(0,300),stack:String(stack||"").slice(0,600),where,ts:Math.floor(Date.now()/1000)};
  // V6.4.0: IMMER zuerst lokal — überlebt Proxy-Ausfall (genau dann brauchen wir den Log!)
  const dupL=BCC._errs.find(x=>x.message===e.message&&e.ts-x.ts<3600);
  if(dupL){dupL.count=(dupL.count||1)+1;dupL.ts=e.ts}else{e.count=1;BCC._errs.push(e)}
  BCC._errs=BCC._errs.slice(-100);
  try{localStorage.setItem("bcc:errors",JSON.stringify(BCC._errs))}catch(_){}
  // dann best-effort in KV/Proxy (kann fehlschlagen, egal)
  try{const log=await BCC.kv.get("errors")||[];const dup=log.find(x=>x.message===e.message&&e.ts-x.ts<3600);if(dup){dup.count=(dup.count||1)+1;dup.ts=e.ts}else{log.push(e)}await BCC.kv.set("errors",log.slice(-100))}catch(_){}
  if(BCC.config.logErrorEndpoint)try{fetch(BCC.config.logErrorEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(e)})}catch(_){}
};

function mergeErrs(kvErrs){

      if(tks.length){const tl=el("div","ov-tasks");
        tks.slice(0,6).forEach(t=>{const ws=workStatus(t);const tr=el("button","ov-task");

      }
      w.append(pcard);
    });
  });

  w.append(el("div","sec-title","AlphaBatty"));
  const thread=el("div","thread");thread.id="thread";w.append(thread);

// V6.3.5: einheitliche Projekt-Farbe & -Rang.
// Farbe: aktiv→gelb(blink) > blockiert→rot(blink) > manuelle Prio > fertig→grün > neutral.
function projectAttention(p){return (p.tasks||[]).some(t=>t.status==="blocked")}
function projectDot(p){
  if(projectActive(p))return{cls:"yellow",blink:true};
  if(projectAttention(p))return{cls:"red",blink:true};
  if(p.prio)return{cls:p.prio,blink:false};           // manuelle Prio-Markierung zeigt zuverlässig
  const allDone=p.tasks&&p.tasks.length&&(p.tasks||[]).every(t=>t.status==="done");
  if(p.done||allDone)return{cls:"green",blink:false};
  return{cls:"",blink:false};
}
// Rang für „aktivste zuerst": aktiv > braucht-dich(blockiert) > offene Tasks > Aktualität
function projectRank(p){
  // V6.4.4: zuletzt von MIR berührt rankt am höchsten (überlebt Reload via _touch), dann aktiv/Achtung, dann offene Tasks/Aktualität
  const mine=sessionTouch("proj-"+p.slug);
  return (mine?5e6+mine/1e6:0)+(projectActive(p)?2e6:0)+(projectAttention(p)?1e6:0)+openTasks(p)*100+(p.updatedAt||0)/1e7;
}

async function loadProjectFiles(slug,wrap){
  if(!BCC.config.projectFilesEndpoint){wrap.remove&&wrap.remove();return}
  let files=[];try{const r=await fetch(BCC.config.projectFilesEndpoint+"?slug="+encodeURIComponent(slug));const j=await r.json();files=j.files||[]}catch(e){return}
  if(!files.length){wrap.style.display="none";return}
  wrap.innerHTML=`<div class="cap" style="cursor:default">Daten <span class="n">${files.length}</span></div>`;
  const strip=el("div","pfstrip");
  files.forEach(f=>{const base=BCC.config.projectFileBase||"";const url=base+f.url.replace("/setup-api","");
    const card=el("button","pfile");
    if(f.kind==="image"){card.innerHTML=`<span class="pfthumb" style="background-image:url('${url}')"></span><span class="pfname">${f.name}</span>`}
    else{const icon=f.ext==="pdf"?"📄":f.ext==="md"?"📝":f.ext==="html"||f.ext==="htm"?"🌐":f.ext==="csv"?"📊":f.ext==="json"?"⚙️":"📄";
      card.innerHTML=`<span class="pfthumb pficon">${icon}</span><span class="pfname">${f.name}</span>`}
    card.title=f.rel+" · "+fmtBytes(f.size);

  wrap.append(strip);
}
function fmtBytes(n){if(!n)return"0 B";const u=["B","KB","MB","GB"];let i=0;while(n>=1024&&i<3){n/=1024;i++}return n.toFixed(i?1:0)+" "+u[i]}
async function openFilePreview(f,url){
  sheetOpen(`<div class="sheet-head"><span class="st">${f.name}</span><button class="x" id="shX">×</button></div><div id="fpBody" class="fp-body"><div class="empty">lädt …</div></div><a class="mi" href="${url}" target="_blank" rel="noopener"><span class="ico">↗</span>In neuem Tab öffnen</a>`);
  $("#shX").onclick=sheetClose;
  const body=$("#fpBody");
  try{
    if(f.kind==="image"){body.innerHTML=`<img src="${url}" style="max-width:100%;border-radius:10px">`}

async function togglePlay(t){
  const live=!!BCC.config.taskPlayEndpoint;
  if(BCC.run[t.id]||t.running||t.status==="in_progress"){await BCC.api.taskStop(t.id);delete BCC.run[t.id];toast("Gestoppt");await refreshAndKeep();return}
  if(!live){ // Mock: klar gekennzeichneter Einzel-Turn
    BCC.run[t.id]="queued";rerender();await new Promise(r=>setTimeout(r,400));BCC.run[t.id]="run";rerender();
    let res;try{res=await BCC.api.taskPlay(t.id)}catch(e){res={reply:"Fehler.",mock:true}}delete BCC.run[t.id];
    const k="chat:task-"+t.id;const h=await BCC.kv.get(k)||[];h.push({role:"batty",text:res.reply,mock:true});await BCC.kv.set(k,h);
    await mutateTask(t.id,{status:"done"});toast("▶ (Mock) erledigt");return}
  // LIVE: echten Loop starten, Server-Status steuert das Blinken
  BCC.run[t.id]="queued";rerender();

  if(res&&res.error){delete BCC.run[t.id];toast(res.error);rerender();return}
  toast("▶ AlphaBatty arbeitet an: "+t.title);startPlayPoll();
}

function setupScrollDown(scroll){
  let btn=$("#center .scrolldown");if(btn)btn.remove();
  btn=el("button","scrolldown show");btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg><span class="lk"></span>';
  $("#center").append(btn);BCC._scroll=BCC._scroll||{lock:false};
  const atBottom=()=>scroll.scrollHeight-scroll.scrollTop-scroll.clientHeight<40;
  // V6.3.4: Button IMMER sichtbar. Klick: ist Lock an → aus; sonst ans Ende springen UND Lock an.
  const upd=()=>{btn.classList.add("show");btn.classList.toggle("locked",BCC._scroll.lock);btn.classList.toggle("atbottom",atBottom()&&!BCC._scroll.lock);btn.querySelector(".lk").textContent=BCC._scroll.lock?"🔒":"";btn.title=BCC._scroll.lock?"Auto-Scroll aus":"Ans Ende & mitlaufen"};
  btn.onclick=()=>{if(BCC._scroll.lock){BCC._scroll.lock=false}else{scroll.scrollTop=scroll.scrollHeight;BCC._scroll.lock=true}upd()};
  scroll.addEventListener("scroll",()=>{if(BCC._scroll.lock&&!atBottom())BCC._scroll.lock=false;upd()});
  BCC._scrollUpd=upd;upd();
}
async function loadThread(sessionId,thread,p,scroll,opts){
  const _sameSess=BCC._shownSession===sessionId;
  const _prevTop=scroll?scroll.scrollTop:0;
  const _wasBottom=scroll?(scroll.scrollHeight-scroll.scrollTop-scroll.clientHeight<60):true;
  BCC._curThread={session:sessionId,proj:p};let hist=await getChat(sessionId);thread.innerHTML="";
  if(!secureCtx())thread.append(el("div","securenote","⚠️ Mikrofon & iPhone-Install brauchen HTTPS — öffne die App über die https://…ts.net-Adresse."));
  if(!hist.length){const e=el("div","empty");e.innerHTML=`<div class="big">🦇</div>${p?`Arbeite mit AlphaBatty an <b>${p.name}</b>.`:"Batty, was liegt an?"}`;thread.append(e)}
  else{
    // V6.5.1: NORMAL — älteste oben, neueste unten. Ältere oben nachladbar.
    if(hist.length>200){const more=el("button","loadolder",`↑ ${hist.length-200} ältere laden`);

      thread.append(more)}

  if(scroll){setupScrollDown(scroll);requestAnimationFrame(()=>{
    if(_sameSess&&!(opts&&opts.toBottom)){
      // Refresh derselben Ansicht (z.B. Play-Loop): Position HALTEN — kein Sprung mehr.
      if((BCC._scroll&&BCC._scroll.lock)||_wasBottom)scroll.scrollTop=scroll.scrollHeight;
      else scroll.scrollTop=_prevTop;
    }else{ scroll.scrollTop=scroll.scrollHeight; BCC._scroll&&(BCC._scroll.lock=true); }
    BCC._scrollUpd&&BCC._scrollUpd();
  })}

function scrollEnd(sc){if(sc&&BCC._scroll&&BCC._scroll.lock)requestAnimationFrame(()=>{sc.scrollTop=sc.scrollHeight});BCC._scrollUpd&&BCC._scrollUpd()}
function bubble(m){if(m.audio){
    // V6.4.0: Audio = ruhiges Mikro-Logo + transkribierter Text. Animiert NUR während Transkription.
    const transcribing=!!m.transcribing;
    const b=el("div","msg me audio"+(transcribing?" transcribing":""));
    const mic=`<span class="micic" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></span>`;
    if(transcribing){
      b.innerHTML=mic+`<span class="trx">transkribiert …</span>`;
    }else if(m.text){
      b.innerHTML=mic;b.append(document.createTextNode(m.text));
      const dur=el("span","adur",m.dur||"");b.append(dur);
    }else{
      b.innerHTML=mic+`<span class="mono" style="font-size:11px">${m.dur||"0:0"}</span>`;
    }
    if(m.ts&&!transcribing){const ts=el("span","msgts",fmtMsgTime(m.ts));b.append(ts)}
    return b}
  const b=el("div","msg "+(m.role==="me"?"me":"batty"));if(m.role!=="me")b.innerHTML=`<span class="mlabel">AlphaBatty${m.mock?' <span class="mock-tag">Mock</span>':""}</span>`;
  b.append(document.createTextNode(m.text||""));
  if(m.atts&&m.atts.length){const wrap=el("div","atts");m.atts.forEach(a=>{if(a.url&&a.type&&a.type.startsWith("image/")){const im=el("img","athumb");im.src=a.url;wrap.append(im)}else{const c=el("span","att");c.textContent="📎 "+a.name;wrap.append(c)}});b.append(wrap)}
  if(m.text){const cp=el("button","copybtn","⧉ Kopieren");cp.onclick=e=>{e.stopPropagation();(navigator.clipboard?navigator.clipboard.writeText(m.text):Promise.reject()).then(()=>{cp.textContent="✓ Kopiert";setTimeout(()=>cp.textContent="⧉ Kopieren",1200)}).catch(()=>toast("Kopieren nicht verfügbar"))};b.append(cp)}
  // V6.4.4: Timestamp bei jeder Nachricht
  if(m.ts){const ts=el("span","msgts",fmtMsgTime(m.ts));b.append(ts)}
  return b}
function fmtMsgTime(ts){const d=new Date(ts);const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  const hm=d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
  if(sameDay)return hm;
  const yd=new Date(now);yd.setDate(now.getDate()-1);
  if(d.toDateString()===yd.toDateString())return "gestern "+hm;
  return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})+" "+hm;}
async function pushMsg(sessionId,thread,scroll,msg){const e=thread.querySelector(".empty");if(e)e.remove();
  const persist={...msg};if(persist.atts)persist.atts=persist.atts.map(a=>({name:a.name,type:a.type}));
  if(!persist.ts)persist.ts=Date.now();msg.ts=persist.ts;
  await appendChat(sessionId,persist);
  // V6.5.1: neueste Nachricht UNTEN → anhängen
  const node=bubble(msg);
  thread.append(node);
  if(msg.role==="me"){if(scroll){BCC._scroll&&(BCC._scroll.lock=true);requestAnimationFrame(()=>{scroll.scrollTop=scroll.scrollHeight});BCC._scrollUpd&&BCC._scrollUpd()}}
  else scrollEnd(scroll)}
function scrollTop(sc){if(sc)requestAnimationFrame(()=>{sc.scrollTop=0});BCC._scrollUpd&&BCC._scrollUpd()}

async function sendMessage(sessionId,slug,thread,scroll,text,files,ctx){
  // Auto-Match nur im Main-Chat ohne Projekt
  let targetSlug=slug;
  if(sessionId==="main"&&!slug&&text){const m=matchProject(text);if(m){targetSlug=m;if(m===LOST){await ensureLost();}}}
  // V6.4.1: SOFORT — noch bevor irgendwas gesendet wird — als aktiv markieren + Aktualität setzen.
  // So blinkt der Task/Chat gelb und steht oben in der Sidebar, in dem Moment wo ich sende.
  setBusy(sessionId,targetSlug,true);
  touchSession(sessionId,targetSlug);
  if(ctx&&ctx.taskId){setBusy("task-"+ctx.taskId,null,true);touchSession("task-"+ctx.taskId)}
  rerenderSidebarOnly();
  const atts=files.map(f=>({name:f.name,type:f.type,url:f.type.startsWith("image/")?URL.createObjectURL(f):null}));
  await pushMsg(sessionId,thread,scroll,{role:"me",text,atts});
  if(sessionId==="main"&&targetSlug){ // spiegeln in Projekt-Thread + Hinweis
    await appendChat("proj-"+targetSlug,{role:"me",text,ts:Date.now()});
    toast("→ zugeordnet: "+(projectBySlug(targetSlug)?.name||targetSlug));}
  // Task-Kontext-Injektion: der Agent bekommt vorangestellt, WO er ist (Bubble bleibt sauber)
  let agentText=text;
  if(ctx&&ctx.taskId)agentText=`[BCC-Kontext: Du arbeitest am Task „${ctx.taskTitle}" im Projekt „${ctx.projectName}". Ziel: ${ctx.taskVision||"(noch nicht beschrieben)"}. Beziehe dich genau auf diesen Task und aktualisiere danach STATUS/TASKS.]\n\n${text}`;
  // V6.4.8: Wenn ich nach einem Task/To-Do frage, MUSS AlphaBatty ihn echt in BCC anlegen (TASKS.md).
  if(/\b(mach|erstell|leg|setz|adde?|neuer?|neue|create|add)\b.{0,20}\b(task|aufgabe|to-?do|todo)\b/i.test(text)||/\b(task|aufgabe|to-?do|todo)\b.{0,12}\b(anleg|erstell|hinzu|mach)/i.test(text)){
    const where=ctx&&ctx.projectName?`Projekt „${ctx.projectName}"`:(targetSlug?`Projekt „${projectBySlug(targetSlug)?.name||targetSlug}"`:"das thematisch passende Projekt");
    agentText=`[BCC-AUFTRAG: Heiner möchte einen Task anlegen. Lege ihn ECHT in BCC an — schreibe ihn als Checkbox-Zeile in die TASKS.md von ${where} (oder rufe das task-create-Tool auf), damit er in der BCC-Übersicht und Seitenleiste erscheint. Markiere wer zuständig ist (Heiner/Batty). Bestätige danach kurz, in welchem Projekt der Task jetzt liegt.]\n\n`+agentText;
  }
  let typing=null;try{typing=el("div","typing","<i></i><i></i><i></i>");thread.append(typing);scrollEnd(scroll)}catch(_){}
  let res;try{res=files.length?await BCC.api.chatFiles(agentText,files,sessionId,targetSlug||slug):await BCC.api.chat(agentText,sessionId,targetSlug||slug)}catch(e){BCC.logNet&&BCC.logNet("/chat",e);res={reply:"⚠️ Verbindung fehlgeschlagen.",mock:true}}
  setBusy(sessionId,targetSlug,false);if(ctx&&ctx.taskId)setBusy("task-"+ctx.taskId,null,false);
  // V6.4.3: Antwort wird IMMER persistiert — auch wenn man längst weg-navigiert ist (Multitasking!).
  // DOM-Update (typing entfernen, Bubble einfügen) ist best-effort und nur relevant, falls man noch da ist.
  try{if(typing)typing.remove()}catch(_){}
  if(BCC._curThread&&BCC._curThread.session===sessionId){
    await pushMsg(sessionId,thread,scroll,{role:"batty",text:res.reply,mock:res.mock});
  }else{
    await appendChat(sessionId,{role:"batty",text:res.reply,mock:res.mock,ts:Date.now()});
  }
  touchSession(sessionId,targetSlug);
  // V6.3.1: wenn AlphaBatty einen STATUS-Verdict mitschickt, sofort neu laden — sonst sieht man den
  // Wechsel zu "blocked/rot" erst beim nächsten 30s-Poll.
  if(res.tasksUpdated||/\bSTATUS:\s*(DONE|CONTINUE|NEEDS_INPUT|BLOCKED)\b/i.test(res.reply||""))await refreshAndKeep();
  else rerenderSidebarOnly();
}
function rerenderSidebarOnly(){try{renderSidebar();renderOverviewPanel()}catch(_){}}

/* ---------------- AUDIO ---------------- */
function pickMime(){for(const m of["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac",""]){if(m===""||(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)))return m}return""}
function setupRecorder(btn,timerEl,sessionId,slug,thread,scroll){let rec,chunks=[],t0=0,tick;
  btn.onclick=async()=>{if(rec&&rec.state==="recording"){rec.stop();return}
    if(!micAvailable()){toast(secureCtx()?"Mikrofon vom Browser blockiert.":"Mikrofon braucht HTTPS — öffne die App über https://…ts.net");return}
    let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e){toast("Mikrofon verweigert.");return}
    const mime=pickMime();rec=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);chunks=[];
    rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
    rec.onstop=async()=>{clearInterval(tick);btn.classList.remove("active");timerEl.hidden=true;stream.getTracks().forEach(t=>t.stop());
      const dur=fmt((Date.now()-t0)/1000);
      const blob=new Blob(chunks,{type:mime||"audio/webm"});
      setBusy(sessionId,slug,true);touchSession(sessionId,slug);rerenderSidebarOnly();
      // V6.4.3: DOM-Updates sind best-effort (man kann längst weg-navigiert sein — das ist ein
      // Multitasking-Tool). Die PERSISTENZ (appendChat) ist das, was niemals verloren gehen darf.
      let ph=null;try{ph=bubble({audio:true,transcribing:true,role:"me"});thread.append(ph);scrollEnd(scroll)}catch(_){}
      let res;try{res=await BCC.api.audio(blob,sessionId,slug)}catch(e){BCC.logNet&&BCC.logNet("/chat-audio",e);res={reply:"⚠️ Audio-Upload fehlgeschlagen.",mock:true}}
      let transcript=res.transcript||"";
      if(!transcript&&res.reply){const m=res.reply.match(/^🎤\s*[„"]([^"""]+)[""]/);if(m)transcript=m[1]}
      const finalAudio={audio:true,role:"me",dur,text:transcript||"(Audio gesendet)",ts:Date.now()};
      // ERST persistieren (lokal+KV) — DAS darf nie ausbleiben, egal wo man gerade ist.
      await appendChat(sessionId,finalAudio);
      setBusy(sessionId,slug,false);
      // DANN best-effort DOM (nur falls man noch in diesem Chat ist)
      try{if(ph&&ph.isConnected)ph.replaceWith(bubble(finalAudio));

  let ok=false;

}

// V6.4.5: Mini-Kalender für Rechtsklick-Menüs — Klick auf einen Tag plant ein (Task/Projekt/Chat)
async function renderMiniCal(host,ref,label){
  if(!host)return;
  const map=await BCC.kv.get("calendar")||{};
  // Index aufbauen: welcher ref ist auf welchem Tag?
  BCC._calIndex={};Object.entries(map).forEach(([iso,refs])=>(refs||[]).forEach(r=>{BCC._calIndex[r]=iso}));
  const cur=BCC._calIndex[ref];
  const today=new Date();today.setHours(0,0,0,0);
  const base=BCC._miniCalMonth?new Date(BCC._miniCalMonth):new Date(today);
  base.setDate(1);
  const y=base.getFullYear(),mo=base.getMonth();
  const monthName=base.toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const firstDow=(new Date(y,mo,1).getDay()+6)%7; // Mo=0
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const dows=["M","D","M","D","F","S","S"];
  let cells="";
  for(let i=0;i<firstDow;i++)cells+=`<span class="mc-empty"></span>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,mo,d);const iso=`${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=dt.getTime()===today.getTime();
    const isSel=cur===iso;
    const isPast=dt<today;
    cells+=`<button class="mc-day${isToday?" today":""}${isSel?" sel":""}${isPast?" past":""}" data-iso="${iso}">${d}</button>`;
  }
  host.innerHTML=`<div class="minical">
    <div class="mc-head"><button class="mc-nav" data-d="-1">‹</button><span class="mc-title">${monthName}</span><button class="mc-nav" data-d="1">›</button></div>
    <div class="mc-dows">${dows.map(d=>`<span>${d}</span>`).join("")}</div>
    <div class="mc-grid">${cells}</div>
  </div>`;
  host.querySelectorAll(".mc-nav").forEach(b=>b.onclick=()=>{const nm=new Date(y,mo+ +b.dataset.d,1);BCC._miniCalMonth=nm.toISOString();renderMiniCal(host,ref,label)});
  host.querySelectorAll(".mc-day").forEach(b=>b.onclick=async()=>{
    const iso=b.dataset.iso;await calSchedule(ref,iso);

async function calSchedule(ref,iso){
  const m=await BCC.kv.get("calendar")||{};
  // erst überall entfernen (nur EIN Tag pro Ref), dann neu setzen
  Object.keys(m).forEach(k=>{m[k]=(m[k]||[]).filter(r=>r!==ref)});
  m[iso]=m[iso]||[];if(!m[iso].includes(ref))m[iso].push(ref);
  await BCC.kv.set("calendar",m);
  BCC._calIndex=BCC._calIndex||{};BCC._calIndex[ref]=iso;
}
async function calUnschedule(ref){
  const m=await BCC.kv.get("calendar")||{};
  Object.keys(m).forEach(k=>{m[k]=(m[k]||[]).filter(r=>r!==ref)});
  await BCC.kv.set("calendar",m);
  if(BCC._calIndex)delete BCC._calIndex[ref];
}
