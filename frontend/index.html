const V65={};
const _v65esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]));
V65.STATUS=[
  {k:"grau",   label:"unklar",    emoji:"⚪", v:"--v65-grau",    w:0},
  {k:"violett",label:"Idee",      emoji:"🟣", v:"--v65-violett", w:1},
  {k:"blau",   label:"geplant",   emoji:"🔵", v:"--v65-blau",    w:2},
  {k:"gelb",   label:"arbeitet",  emoji:"🟡", v:"--v65-gelb",    w:3},
  {k:"gruen",  label:"fertig",    emoji:"🟢", v:"--v65-gruen",   w:4},
  {k:"rot",    label:"blockiert", emoji:"🔴", v:"--v65-rot",     w:9}
];
V65.ST=Object.fromEntries(V65.STATUS.map(s=>[s.k,s]));
V65.mapOld=(s)=>({done:"gruen",in_progress:"gelb",running:"gelb",waiting:"blau",today:"gelb",blocked:"rot",idea:"violett",pending:"grau"}[s]||"grau");
V65.taskStatus6=(t)=>{ if(!t)return"grau"; if(typeof taskBusy==="function"&&taskBusy(t))return"gelb";
  if(t.running||BCC.run[t.id]==="running"||BCC.run[t.id]==="queued")return"gelb"; return V65.mapOld(t.status); };
V65.projStatus6=(p)=>{ const ts=(p&&p.tasks)||[];
  if(ts.some(t=>t.status==="blocked"))return"rot";
  if(typeof projectActive==="function"&&projectActive(p))return"gelb";
  if(p.done||(ts.length&&ts.every(t=>t.status==="done")))return"gruen";
  if(ts.length&&ts.every(t=>t.status==="idea"))return"violett";
  if(!ts.length)return"grau";
  if(ts.some(t=>!["done","idea"].includes(t.status)))return"blau";
  return"grau"; };
V65.status6=(n)=>{ if(!n)return"grau";
  const ovr=(BCC.ov&&BCC.ov.status6||{})[n.id]; if(ovr)return ovr;
  if(n.kind==="task")return V65.taskStatus6(n.raw);
  if(n.kind==="project")return V65.projStatus6(n.raw);
  const set=(n.children||[]).map(k=>V65.status6(k));
  if(set.includes("rot"))return"rot"; if(set.includes("gelb"))return"gelb";
  if(set.length&&set.every(s=>s==="gruen"))return"gruen";
  if(set.length&&set.every(s=>s==="violett"))return"violett";
  if(!set.length)return"grau"; return"blau"; };
V65.dotCls=(k)=>({rot:"red",gelb:"yellow",gruen:"green"}[k]||"");

V65.tree=function(){
  const projects=(BCC.state.projects||[]).filter(p=>!p.archived);
  const ovP=(BCC.ov&&BCC.ov.parentFolder)||{};
  const ovE=(BCC.ov&&BCC.ov.nodeEmoji)||{};
  const byId={};
  byId.root={id:"root",kind:"overview",name:"Übersicht",emoji:"👑",parentId:null,children:[],
    goal:"Der gesamte Unternehmens-Staat im Blick."};
  WS_DEF.forEach(w=>{byId["ws:"+w[0]]={id:"ws:"+w[0],kind:"workspace",wsKey:w[0],name:w[2],emoji:w[1],
    parentId:"root",children:[],goal:""};});
  byId["ws:_none"]={id:"ws:_none",kind:"workspace",wsKey:"_none",name:"Ohne Workspace",emoji:"📂",parentId:"root",children:[],goal:""};
  projects.forEach(p=>{const id="proj:"+p.slug;
    byId[id]={id,kind:"project",slug:p.slug,name:p.name,emoji:p.emoji||"",raw:p,parentId:null,children:[],
      goal:(p.vision||(typeof lastStatus==="function"?lastStatus(p):"")||"")};});
  projects.forEach(p=>{const n=byId["proj:"+p.slug]; let pid=null;
    const pf=p.parentFolder||ovP[p.slug];
    if(pf&&byId["proj:"+pf])pid="proj:"+pf;
    else{const ws=(typeof inferWorkspaces==="function"?inferWorkspaces(p):[]).find(k=>WS_LABEL[k]); pid=ws?("ws:"+ws):"ws:_none";}
    n.parentId=pid;});
  projects.forEach(p=>{(p.tasks||[]).forEach(t=>{const id="task:"+t.id;
    const pid=t.parentTaskId?("task:"+t.parentTaskId):("proj:"+p.slug);
    byId[id]={id,kind:"task",taskId:t.id,slug:p.slug,name:t.title,emoji:t.emoji||"",raw:t,parentId:pid,children:[],
      goal:t.vision||t.context||""};});});
  Object.values(byId).forEach(n=>{if(n.parentId&&byId[n.parentId])byId[n.parentId].children.push(n);});
  Object.values(byId).forEach(n=>{if(ovE[n.id])n.emoji=ovE[n.id];});
  V65._byId=byId; return byId;
};
V65.node=(id)=>{const t=V65._byId||V65.tree();return t[id]||t.root;};
V65.path=(id)=>{const t=V65._byId||V65.tree();const out=[];let n=t[id],g=0;while(n&&g++<40){out.unshift(n);n=n.parentId?t[n.parentId]:null;}return out;};
V65.session=(n)=>n.kind==="overview"?"overview":n.kind==="workspace"?("ws-"+n.wsKey):n.kind==="project"?("proj-"+n.slug):("task-"+n.taskId);
V65.rank=(n)=>{const s=V65.status6(n);const w={rot:5,gelb:4,blau:3,violett:2,gruen:1,grau:0}[s]||0;
  const ts=(n.raw&&n.raw.updatedAt)||(n.kind==="overview"?9e15:0);return w*1e12+(ts||0);};

V65.routeNodeId=function(){const s=BCC.state,r=s.route;

V65.counts=function(filt){V65.tree();const c={grau:0,violett:0,blau:0,gelb:0,gruen:0,rot:0};
  Object.values(V65._byId).forEach(n=>{ if(n.kind==="task"&&filt&&!filt(n.raw))return;
    if(n.kind==="project"||n.kind==="task"){const s=V65.status6(n);if(c[s]!=null)c[s]++;}});return c;};
V65.analysis=function(filt){const c=V65.counts(filt);const tot=Object.values(c).reduce((a,b)=>a+b,0);

  return{c,tot,lead};};

V65.movePicker=function(node){
  if(node.kind!=="project"){toast("Verschieben gibt's f\u00fcr Raum-/Projekt-Chats.");return;}
  V65.tree();
  const banned=new Set();(function mark(id){if(!V65._byId[id])return;banned.add(id);(V65._byId[id].children||[]).forEach(c=>mark(c.id));})(node.id);
  const exp=new Set(["root"]);V65.path(node.id).forEach(a=>exp.add(a.id));
  const setFor=(n)=> n.id==="root"?{parentFolder:null,workspaces:[]} : n.kind==="workspace"?{parentFolder:null,workspaces:[n.wsKey]} : {parentFolder:n.slug};
  const doMove=async(n)=>{const set=setFor(n);await patchProject(node.slug,set);BCC.ov.parentFolder=BCC.ov.parentFolder||{};if(set.parentFolder)BCC.ov.parentFolder[node.slug]=set.parentFolder;else delete BCC.ov.parentFolder[node.slug];try{await saveOverrides()}catch(_){}sheetClose();V65.tree();toast("Verschoben \u2192 "+n.name);rerender();};
  function rowsHTML(n,depth){
    const kids=(n.children||[]).filter(c=>c.kind!=="task").sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    const hasK=kids.length>0;const open=exp.has(n.id);
    const isCurrent=n.id===node.parentId;const isSelf=n.id===node.id;
    const ic=n.emoji?_v65esc(n.emoji)+" ":(n.kind==="overview"?"\ud83d\udc51 ":n.kind==="workspace"?"":"\ud83d\udcc1 ");
    let h=`<div class="mvrow${isCurrent?" cur":""}" style="padding-left:${8+depth*18}px">`+
      `<span class="mvtw" data-exp="${n.id}">${hasK?(open?"\u25be":"\u25b8"):"\u00b7"}</span>`+
      `<span class="mvnm" data-exp="${n.id}">${ic}${_v65esc(n.name)}${isCurrent?' <span class="mvhere">\u00b7 hier</span>':''}</span>`+
      (isSelf?'<span class="mvban">der Chat</span>':banned.has(n.id)?'<span class="mvban">\u2014</span>':isCurrent?'':`<button class="mvsel" data-sel="${n.id}">Hierher</button>`)+
      `</div>`;
    if(hasK&&open)kids.forEach(k=>h+=rowsHTML(k,depth+1));
    return h;
  }
  const render=()=>{const host=$("#mvTree");host.innerHTML=rowsHTML(V65._byId.root,0);
    host.querySelectorAll("[data-exp]").forEach(e=>e.onclick=()=>{const id=e.dataset.exp;if(exp.has(id))exp.delete(id);else exp.add(id);render()});

    :(parent&&parent.kind==="project"?((typeof inferWorkspaces==="function"&&inferWorkspaces(parent.raw)[0])||null):null);

  let np;try{np=await BCC.api.createProject("Neuer Chat","",null,(preWs&&WS_LABEL[preWs]?[preWs]:[]),null,[],parentSlug||null)}catch(e){np=null}
  if(!np){toast("Konnte keinen Chat anlegen — läuft der Proxy?");return}
  if(!projectBySlug(np.slug))BCC.state.projects.unshift(np);

  if(parentSlug){BCC.ov.parentFolder=BCC.ov.parentFolder||{};BCC.ov.parentFolder[np.slug]=parentSlug;}

// V6.4.4: Mobile Swipe-Gesten — von links rein = Listen-Drawer, von rechts rein = Layer-Panel, zurück = schließen
(function setupSwipe(){
  if(!("ontouchstart" in window))return;
  let x0=null,y0=null,edge=null;
  const EDGE=28,TRIG=55;
  document.addEventListener("touchstart",e=>{
    if(window.innerWidth>=860)return;
    const t=e.touches[0];x0=t.clientX;y0=t.clientY;edge=null;
    if(x0<=EDGE)edge="left";else if(x0>=window.innerWidth-EDGE)edge="right";
  },{passive:true});
  document.addEventListener("touchend",e=>{
    if(x0==null)return;const t=e.changedTouches[0];const dx=t.clientX-x0,dy=t.clientY-y0;
    if(Math.abs(dy)>Math.abs(dx)){x0=null;return} // vertikal = scrollen
    const drawerOpen=document.body.classList.contains("drawer");
    const panelOpen=document.body.classList.contains("ovw-open");
    if(edge==="left"&&dx>TRIG&&!drawerOpen)openDrawer();
    else if(edge==="right"&&dx<-TRIG&&!panelOpen)document.body.classList.add("ovw-open");
    else if(dx<-TRIG&&drawerOpen)closeDrawer();             // zurück nach links schließt linken Drawer
    else if(dx>TRIG&&panelOpen)document.body.classList.remove("ovw-open"); // zurück nach rechts schließt Panel
    x0=null;y0=null;edge=null;
  },{passive:true});
})();

  sheetOpen(`<div class="sheet-head"><span class="st">Batty Command Center</span><button class="x" id="shX">×</button></div>
    <div class="health-ov">
      <div class="hrow"><span class="hk">Version</span><span class="hv"><b>v${info?info.version:(BCC.VERSION||"6.4")}</b>${info&&info.build?" · "+info.build:""} · ${live?"Live":"Mock"}</span></div>
      <div class="hrow"><span class="hk">Projekte</span><span class="hv">${info?info.projectCount+" Ordner gespiegelt":"—"}</span></div>
      <div class="hrow"><span class="hk">Projekt-Pfad</span><span class="hv" style="font:600 11px/1.4 var(--mono);word-break:break-all">${info?info.projectsDir:"—"}${info&&info.projectsDirAutoResolved?' <span style="color:var(--s-waiting)">(auto)</span>':""}</span></div>
      <div class="hrow"><span class="hk">App-Pfad</span><span class="hv" style="font:600 11px/1.4 var(--mono);word-break:break-all">${info?info.staticDir:"—"}${info&&!info.staticIndexExists?' <span style="color:var(--s-blocked)">index.html fehlt!</span>':""}</span></div>
    </div>
    ${changelog}`);
  $("#shX").onclick=sheetClose}

/* ---------------- THEME ---------------- */
const SUN_IC='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.1"/><path d="M12 2v2.4M12 19.6V22M2 12h2.4M19.6 12H22M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7"/></svg>';
const MOON_IC='<svg viewBox="0 0 24 24"><path d="M20 14.4A8 8 0 1 1 9.6 4 6.3 6.3 0 0 0 20 14.4Z"/></svg>';
function effTheme(){const a=document.documentElement.getAttribute("data-theme");const mm=window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)");return a||((mm&&mm.matches)?"light":"dark")}
function updThemeUI(){const dark=effTheme()==="dark";const b=$("#themeBtn");if(b)b.innerHTML=dark?MOON_IC:SUN_IC;const bg=getComputedStyle(document.documentElement).getPropertyValue("--bg").trim();const m=$("#tcMeta");if(m&&bg)m.setAttribute("content",bg)}
function setTheme(mode){if(mode)document.documentElement.setAttribute("data-theme",mode);else document.documentElement.removeAttribute("data-theme");try{mode?localStorage.setItem("bcc-theme",mode):localStorage.removeItem("bcc-theme")}catch(e){}updThemeUI()}
$("#themeBtn").onclick=()=>setTheme(effTheme()==="dark"?"light":"dark");
if(window.matchMedia)window.matchMedia("(prefers-color-scheme: light)").addEventListener?.("change",()=>{if(!document.documentElement.getAttribute("data-theme"))updThemeUI()});

/* ---------------- DATA + BOOT ---------------- */
async function refreshProjects(){BCC.state.projects=await BCC.api.projects();BCC._orig=clone(BCC.state.projects);applyOverrides()}
async function refreshAndKeep(){
  await refreshProjects();
  // V6.4.9: Scroll-Position über den Refresh hinweg erhalten — sonst springt das Zentrum nach oben,
  // wenn parallel gearbeitet wird und ein STATUS-Verdict reinkommt.
  const scrollers=[...document.querySelectorAll("#center .cscroll, #overview .ov-scroll")];
  const saved=scrollers.map(s=>[s.className,s.scrollTop]);
  rerender();
  // nach rerender sind es neue Knoten — per Klassenname zuordnen
  requestAnimationFrame(()=>{
    saved.forEach(([cls,top])=>{const sel=cls.split(" ").map(c=>"."+c).join("");const el2=document.querySelector("#center "+sel+", #overview "+sel);if(el2)el2.scrollTop=top});
  });
}
function startPolling(){if(!BCC.config.projectsEndpoint||BCC._pollT)return;
  const sig=()=>JSON.stringify(BCC.state.projects.map(p=>[p.slug,p.updatedAt,p.done,openTasks(p),projectActive(p),
    (p.tasks||[]).map(t=>[t.id,t.status,t.running?1:0]),(p.md&&p.md.status||"").length]));
  BCC._pollT=setInterval(async()=>{if(document.visibilityState!=="visible")return;
    const before=sig();await refreshProjects();if(before!==sig()){const ae=document.activeElement;if(!(ae&&ae.id==="ci"))rerenderSoft()}},BCC.config.pollMs||30000)}
document.addEventListener("scroll",e=>{if(e.target&&e.target.classList&&e.target.classList.contains("cscroll"))BCC._lastScrollTs=Date.now()},true);
document.addEventListener("visibilitychange",async()=>{if(document.visibilityState==="visible"&&BCC.config.projectsEndpoint){await refreshProjects();rerenderSoft()}});

function startHealthPoll(){if(!BCC.config.systemHealthEndpoint||BCC._healthT)return;
  const tick=async()=>{if(document.visibilityState!=="visible"&&BCC._lastLvl!=="crit")return;await fetchHealth();applyHealthTopbar();maybeOverloadNotify();
    if(BCC.state.route==="overview"){const hb=$(".healthbar");if(hb)hb.replaceWith(healthBar())}};
  tick();BCC._healthT=setInterval(tick,30000)}

async function boot(){
  if(location.protocol.startsWith("http")&&!/(^|\.)claude/.test(location.hostname)&&location.hostname!=="")BCC.goLive();
  const live=!!BCC.config.chatEndpoint;$("#conn").dataset.live=live?"1":"0";$("#connTxt").textContent=live?"Live":"Mock";
  $("#brandVer").textContent="v"+BCC.VERSION;
  if(BCC.config.systemHealthEndpoint){fetch(BCC.config.systemHealthEndpoint.replace("system-health","whereami")).then(r=>r.json()).then(w=>{if(w&&w.version){BCC.VERSION=w.version;$("#brandVer").textContent="v"+w.version}}).catch(()=>{})}
  window.addEventListener("error",e=>{BCC.logError(e.message,e.error&&e.error.stack,(e.filename||"")+":"+e.lineno)});
  window.addEventListener("unhandledrejection",e=>{BCC.logError("Unhandled: "+(e.reason&&e.reason.message||e.reason),e.reason&&e.reason.stack,"promise")});
  await loadWorkspaceDefs();await loadOverrides();await refreshProjects();await migrateLegacyWorkspaces();await refreshChatPrev();parseHash();rerender();startPolling();startHealthPoll();updThemeUI();
  if(BCC._migratedWs)toast(BCC._migratedWs+" Projekte den neuen Workspaces zugeordnet");
  if(typeof fetchHealth==="function"){fetchHealth().then(()=>applyHealthTopbar()).catch(()=>{})}
  if(window.Notification&&Notification.permission==="default"){try{Notification.requestPermission()}catch(e){}}
  if("serviceWorker" in navigator&&window.isSecureContext)navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
}
boot();
</script>
